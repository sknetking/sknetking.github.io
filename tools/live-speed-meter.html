<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Speedometer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --speed-color: #00ff88;
        }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .gauge-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .gauge-ring {
            fill: none;
            stroke-width: 14;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .gauge-bg {
            stroke: #1a1a1a;
        }
        .gauge-progress {
            stroke: var(--speed-color);
            filter: drop-shadow(0 0 12px var(--speed-color));
        }
        .speed-text {
            font-variant-numeric: tabular-nums;
            font-weight: 900;
            letter-spacing: -2px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .4; transform: scale(0.9); }
        }
        .active-glow {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-6 pb-12 overflow-hidden">

    <!-- Header -->
    <div class="w-full flex justify-between items-center mb-6">
        <div class="flex items-center gap-3 glass-card px-4 py-2">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 pulse"></div>
            <span id="status-text" class="text-[10px] uppercase font-bold tracking-[0.2em] text-gray-400">Offline</span>
        </div>
        <button id="unit-toggle" class="px-5 py-2 glass-card text-[10px] font-black uppercase tracking-widest hover:bg-white/10 active:scale-95 transition-all">
            km/h
        </button>
    </div>

    <!-- Main Gauge -->
    <div class="gauge-container flex items-center justify-center mt-4">
        <svg class="w-full h-full" viewBox="0 0 300 300">
            <!-- Background Track -->
            <circle class="gauge-ring gauge-bg" cx="150" cy="150" r="135"></circle>
            <!-- Speed Progress -->
            <circle id="progress-ring" class="gauge-ring gauge-progress" cx="150" cy="150" r="135" stroke-dasharray="848.2" stroke-dashoffset="848.2"></circle>
        </svg>
        <div class="absolute flex flex-col items-center">
            <span id="speed-display" class="speed-text text-8xl md:text-9xl">0</span>
            <span id="unit-label" class="text-sm text-gray-500 font-bold uppercase tracking-[0.3em] mt-[-5px]">km/h</span>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="w-full grid grid-cols-2 gap-4 mt-10">
        <div class="glass-card p-5 flex flex-col items-center border-b-2 border-b-white/5">
            <span class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mb-2">Max Speed</span>
            <div class="flex items-baseline gap-1">
                <span id="max-speed" class="text-3xl font-black">0</span>
                <span class="text-[10px] text-gray-600 font-bold unit-small">KM/H</span>
            </div>
        </div>
        <div class="glass-card p-5 flex flex-col items-center border-b-2 border-b-white/5">
            <span class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mb-2">Trip Distance</span>
            <div class="flex items-baseline gap-1">
                <span id="distance" class="text-3xl font-black text-white">0.00</span>
                <span class="text-[10px] text-gray-600 font-bold">KM</span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full mt-auto space-y-4">
        <div class="flex gap-3">
            <button id="start-btn" class="flex-1 py-5 rounded-[32px] bg-white text-black font-black text-sm uppercase tracking-[0.2em] active:scale-[0.98] transition-all shadow-2xl shadow-white/5">
                Start Session
            </button>
            <button id="reset-btn" class="px-6 rounded-[32px] glass-card text-gray-400 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </div>
        <p class="text-[9px] text-center text-gray-600 uppercase tracking-widest font-medium opacity-60">
            Precision GPS Tracking • 200 KM/H SCALE
        </p>
    </div>

    <!-- Error Overlay -->
    <div id="error-modal" class="hidden fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex items-center justify-center p-10">
        <div class="glass-card p-8 w-full max-w-sm text-center border-red-900/50">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h3 class="text-xl font-black mb-3 text-white uppercase tracking-wider">GPS Access Blocked</h3>
            <p id="error-message" class="text-gray-400 text-sm mb-8 leading-relaxed font-medium">Please enable high-accuracy location services to use the speedometer.</p>
            <button onclick="location.reload()" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase tracking-widest text-xs">Authorize & Retry</button>
        </div>
    </div>

    <script>
        // State
        let isTracking = false;
        let watchId = null;
        let useMetric = true;
        let maxSpeed = 0;
        let totalDistance = 0; // In Kilometers
        let lastPosition = null;
        let wakeLock = null;

        // Config
        const CIRCUMFERENCE = 2 * Math.PI * 135; // r=135
        const MAX_SCALE_KMH = 200; 

        // DOM
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const speedDisplay = document.getElementById('speed-display');
        const unitToggle = document.getElementById('unit-toggle');
        const progressRing = document.getElementById('progress-ring');
        const maxSpeedDisplay = document.getElementById('max-speed');
        const distanceDisplay = document.getElementById('distance');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const errorModal = document.getElementById('error-modal');

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn("WakeLock blocked by policy.");
                }
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of Earth in KM
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function handlePosition(position) {
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
            statusText.innerText = "Live GPS";

            // speed is m/s
            const rawSpeed = position.coords.speed || 0;
            const speedKmh = Math.max(0, rawSpeed * 3.6);
            
            // Handle Distance (only if we have a previous point in this session)
            if (lastPosition) {
                const distChange = calculateDistance(
                    lastPosition.coords.latitude, 
                    lastPosition.coords.longitude,
                    position.coords.latitude,
                    position.coords.longitude
                );
                
                // Only count if movement is significant (avoids GPS drift while stationary)
                // 0.001 km is 1 meter. GPS drift usually varies +/- 3-5 meters.
                if (distChange > 0.003 && speedKmh > 1.5) {
                    totalDistance += distChange;
                    distanceDisplay.innerText = totalDistance.toFixed(2);
                }
            }
            lastPosition = position;

            // Handle Display Logic
            const currentDisplaySpeed = useMetric ? speedKmh : (speedKmh * 0.621371);
            
            if (currentDisplaySpeed > maxSpeed) {
                maxSpeed = currentDisplaySpeed;
                maxSpeedDisplay.innerText = Math.round(maxSpeed);
            }

            updateUI(currentDisplaySpeed);
        }

        function updateUI(speed) {
            speedDisplay.innerText = Math.round(speed);
            
            // Calculate Gauge fill based on 200 kmh limit
            const limit = useMetric ? MAX_SCALE_KMH : (MAX_SCALE_KMH * 0.621371);
            const percent = Math.min(speed / limit, 1);
            const offset = CIRCUMFERENCE - (percent * CIRCUMFERENCE);
            progressRing.style.strokeDashoffset = offset;
            
            // Dynamic Color (Green -> Yellow -> Red)
            let hue;
            if (percent < 0.5) {
                hue = 140; // Green
            } else if (percent < 0.8) {
                hue = 45; // Yellow/Orange
            } else {
                hue = 0; // Red
            }
            document.documentElement.style.setProperty('--speed-color', `hsl(${hue}, 100%, 50%)`);
        }

        function startTracking() {
            isTracking = true;
            lastPosition = null; // Clear previous ref to ensure distance starts fresh
            
            startBtn.innerText = "End Session";
            startBtn.classList.replace('bg-white', 'bg-red-600');
            startBtn.classList.replace('text-black', 'text-white');
            
            statusDot.classList.add('pulse');
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 pulse";
            statusText.innerText = "Syncing...";

            requestWakeLock();

            watchId = navigator.geolocation.watchPosition(handlePosition, (err) => {
                document.getElementById('error-message').innerText = err.message;
                errorModal.classList.remove('hidden');
                stopTracking();
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }

        function stopTracking() {
            isTracking = false;
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (wakeLock) wakeLock.release().then(() => wakeLock = null);

            startBtn.innerText = "Start Session";
            startBtn.classList.replace('bg-red-600', 'bg-white');
            startBtn.classList.replace('text-white', 'text-black');
            
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
            statusText.innerText = "Offline";
            updateUI(0);
        }

        function resetSession() {
            const confirmed = confirm("Reset all trip data?");
            if (confirmed) {
                maxSpeed = 0;
                totalDistance = 0;
                maxSpeedDisplay.innerText = "0";
                distanceDisplay.innerText = "0.00";
                lastPosition = null;
                updateUI(0);
            }
        }

        startBtn.addEventListener('click', () => {
            if (isTracking) stopTracking();
            else startTracking();
        });

        resetBtn.addEventListener('click', resetSession);

        unitToggle.addEventListener('click', () => {
            useMetric = !useMetric;
            unitToggle.innerText = useMetric ? 'km/h' : 'mph';
            document.getElementById('unit-label').innerText = useMetric ? 'km/h' : 'mph';
            document.querySelectorAll('.unit-small').forEach(el => el.innerText = useMetric ? 'KM/H' : 'MPH');
            
            // Recalculate max speed for display
            maxSpeed = useMetric ? (maxSpeed / 0.621371) : (maxSpeed * 0.621371);
            maxSpeedDisplay.innerText = Math.round(maxSpeed);
            updateUI(0);
        });

        // Re-request wake lock on focus
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isTracking) requestWakeLock();
        });
    </script>
</body>
</html>
