<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CHRONO SYNC | Multicolor Digital Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0B1120, #030712);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', 'Segoe UI', 'SF Pro Display', system-ui, -apple-system, 'Poppins', monospace;
      padding: 1.5rem;
      transition: background 0.3s ease;
    }

    /* main glassmorphic container */
    .clock-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(18px);
      border-radius: 3.5rem;
      padding: 2rem 2.8rem;
      box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 0 1px rgba(56, 189, 248, 0.2);
      transition: all 0.25s ease;
      border: 1px solid rgba(56, 189, 248, 0.25);
    }

    .clock-container:hover {
      border-color: rgba(168, 85, 247, 0.4);
      box-shadow: 0 40px 70px -18px black, 0 0 0 1.5px rgba(168, 85, 247, 0.3);
    }

    /* main digit row */
    .clock-face {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.25rem;
      flex-wrap: wrap;
      padding: 0.5rem 0.2rem;
    }

    .time-unit {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
    }

    /* each digit group will have unique gradient + text color */
    .digits {
      font-size: 7rem;
      font-weight: 700;
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* ----- distinct color themes for HOUR, MINUTE, SECOND ----- */
    /* HOURS: vibrant electric cyan + deep blue glow */
    .hour-digits {
      background: linear-gradient(135deg, #67E8F9 0%, #2DD4BF 40%, #06B6D4 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
    }

    /* MINUTES: energetic purple to fuchsia gradient (bold and modern) */
    .minute-digits {
      background: linear-gradient(135deg, #C084FC 0%, #A855F7 45%, #D946EF 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    /* SECONDS: vivid amber to rose / warm sunset vibes */
    .second-digits {
      background: linear-gradient(145deg, #FBBF24 0%, #F97316 55%, #EF4444 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(249, 115, 22, 0.5);
      font-weight: 650;
    }

    /* colon style: neutral but elegant with soft white pulse */
    .colon {
      font-size: 6.5rem;
      font-weight: 500;
      margin: 0 0.3rem;
      background: linear-gradient(145deg, #E2E8F0, #94A3B8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(148, 163, 184, 0.5);
      animation: softPulse 1.8s infinite ease-in-out;
    }

    /* seconds group slightly smaller but dynamic */
    .seconds-group .digits {
      font-size: 5.8rem;
      font-weight: 650;
    }

    /* bottom panel: date and status badges */
    .meta-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.8rem;
      gap: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .date-box {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.5rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(103, 232, 249, 0.4);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      color: #CBD5E1;
      font-family: 'Inter', monospace;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .day-name {
      background: linear-gradient(110deg, #1E293B, #0F172A);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #A5F3FC;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 0.5px solid #22D3EE40;
    }

    .date-num {
      font-weight: 600;
      background: linear-gradient(135deg, #F0F9FF, #BAE6FD);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-feature-settings: "tnum";
    }

    .separator-dot {
      width: 5px;
      height: 5px;
      background: #38BDF8;
      border-radius: 50%;
      display: inline-block;
      opacity: 0.7;
      box-shadow: 0 0 4px #38BDF8;
    }

    .indicator {
      display: flex;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(168, 85, 247, 0.4);
    }

    .badge {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge.period-badge {
      background: linear-gradient(145deg, #FDE047, #FACC15);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .badge.live-badge {
      color: #34D399;
      text-shadow: 0 0 3px #059669;
      font-weight: 600;
      animation: pulseLive 1.2s infinite;
    }

    /* animations */
    @keyframes softPulse {
      0% { opacity: 0.6; text-shadow: 0 0 2px #94A3B8; }
      50% { opacity: 1; text-shadow: 0 0 12px #A5F3FC; }
      100% { opacity: 0.6; text-shadow: 0 0 2px #94A3B8; }
    }

    @keyframes pulseLive {
      0% { opacity: 0.7; text-shadow: 0 0 0px #34D399; }
      100% { opacity: 1; text-shadow: 0 0 5px #34D399; }
    }

    /* second flash effect custom */
    .second-flash {
      filter: brightness(1.3) drop-shadow(0 0 6px #F97316);
      transition: filter 0.07s ease;
    }

    /* responsive adjustments */
    @media (max-width: 780px) {
      .clock-container {
        padding: 1.6rem 2rem;
      }
      .digits {
        font-size: 5rem;
      }
      .colon {
        font-size: 4.5rem;
        margin: 0 0.15rem;
      }
      .seconds-group .digits {
        font-size: 4rem;
      }
      .date-box {
        font-size: 0.85rem;
        padding: 0.4rem 1rem;
      }
    }

    @media (max-width: 580px) {
      .clock-container {
        padding: 1.2rem 1.5rem;
        border-radius: 2.5rem;
      }
      .digits {
        font-size: 3.8rem;
      }
      .colon {
        font-size: 3.2rem;
      }
      .seconds-group .digits {
        font-size: 3rem;
      }
      .meta-panel {
        gap: 0.9rem;
        margin-top: 1.2rem;
      }
      .badge {
        font-size: 0.7rem;
      }
      .day-name {
        font-size: 0.7rem;
        padding: 0.2rem 0.8rem;
      }
    }

    /* additional small glow for hour/minute on hover? optional but nice */
    .time-unit:hover .digits {
      filter: brightness(1.05);
      transition: 0.15s;
    }
  </style>
</head>
<body>
<div class="clock-container">
  <div class="clock-face">
    <!-- HOURS block with distinct class -->
    <div class="time-unit" id="hoursBlock">
      <span class="digits hour-digits" id="hours">00</span>
    </div>
    <!-- COLON -->
    <span class="colon" id="colon1">:</span>
    <!-- MINUTES block distinct color -->
    <div class="time-unit" id="minutesBlock">
      <span class="digits minute-digits" id="minutes">00</span>
    </div>
    <!-- COLON -->
    <span class="colon" id="colon2">:</span>
    <!-- SECONDS block with unique color -->
    <div class="time-unit seconds-group" id="secondsBlock">
      <span class="digits second-digits" id="seconds">00</span>
    </div>
  </div>
  
  <div class="meta-panel">
    <div class="date-box" id="dateBox">
      <span class="day-name" id="weekday">MON</span>
      <span class="separator-dot"></span>
      <span class="date-num" id="fullDate">Jan 01, 2026</span>
    </div>
    <div class="indicator" id="sessionIndicator">
      <span class="badge period-badge" id="amPmLabel">AM</span>
      <span class="badge live-badge" id="liveStatus">● LIVE</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // DOM elements
    const hoursElem = document.getElementById('hours');
    const minutesElem = document.getElementById('minutes');
    const secondsElem = document.getElementById('seconds');
    const weekdayElem = document.getElementById('weekday');
    const fullDateElem = document.getElementById('fullDate');
    const amPmLabel = document.getElementById('amPmLabel');
    
    // Helper: two digits always
    function formatTwoDigits(num) {
      return num < 10 ? '0' + num : '' + num;
    }
    
    // weekday short (3 letters uppercase)
    function getWeekdayShort(date) {
      const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      return weekdays[date.getDay()];
    }
    
    // formatted date: "Mar 12, 2025"
    function getFormattedDate(date) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const month = months[date.getMonth()];
      const day = date.getDate();
      const year = date.getFullYear();
      return `${month} ${day}, ${year}`;
    }
    
    // update AM/PM badge with modern flair (based on 24h)
    function updateAmPmIndicator(hours24) {
      const period = hours24 >= 12 ? 'PM' : 'AM';
      amPmLabel.textContent = period;
      // subtle style change based on period
      if (period === 'AM') {
        amPmLabel.style.opacity = '0.9';
      } else {
        amPmLabel.style.opacity = '1';
      }
    }
    
    // Flash effect on seconds (extra life)
    let lastSecondValue = -1;
    function applySecondFlash(currentSecStr) {
      if (lastSecondValue !== currentSecStr) {
        lastSecondValue = currentSecStr;
        // add temporary glow & scale effect on seconds digits
        const secSpan = secondsElem;
        if (secSpan) {
          secSpan.classList.add('second-flash');
          setTimeout(() => {
            if (secSpan) secSpan.classList.remove('second-flash');
          }, 120);
        }
        // subtle colon bounce pulse
        const colon1 = document.getElementById('colon1');
        const colon2 = document.getElementById('colon2');
        if (colon1 && colon2) {
          colon1.style.transform = 'scale(1.02)';
          colon2.style.transform = 'scale(1.02)';
          setTimeout(() => {
            colon1.style.transform = '';
            colon2.style.transform = '';
          }, 100);
        }
      }
    }
    
    // main clock update function with distinct color handling (already set by classes)
    function updateClock() {
      const now = new Date();
      let hours24 = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      
      const hoursStr = formatTwoDigits(hours24);
      const minutesStr = formatTwoDigits(minutes);
      const secondsStr = formatTwoDigits(seconds);
      
      hoursElem.textContent = hoursStr;
      minutesElem.textContent = minutesStr;
      secondsElem.textContent = secondsStr;
      
      // update AM/PM
      updateAmPmIndicator(hours24);
      
      // update date and weekday
      const weekdayStr = getWeekdayShort(now);
      const fullDateStr = getFormattedDate(now);
      if (weekdayElem.textContent !== weekdayStr) weekdayElem.textContent = weekdayStr;
      if (fullDateElem.textContent !== fullDateStr) fullDateElem.textContent = fullDateStr;
      
      // apply flash effect for seconds (modern micro-interaction)
      applySecondFlash(secondsStr);
    }
    
    // ambient dynamic gradient based on time to match colorful vibe (hour/minute/second synergy)
    function updateDynamicBackground() {
      const now = new Date();
      const hour = now.getHours();
      let gradientAngle = 135;
      let color1, color2, color3;
      // create shifting gradient that complements the clock colors (cyan, purple, amber)
      if (hour >= 6 && hour < 12) {
        // morning: fresh cyan to soft purple
        color1 = '#0A1128';
        color2 = '#142850';
        color3 = '#0C1B33';
        gradientAngle = 120;
      } else if (hour >= 12 && hour < 17) {
        // afternoon: energetic indigo + violet
        color1 = '#0B132B';
        color2 = '#1C2541';
        color3 = '#2A1E3C';
        gradientAngle = 145;
      } else if (hour >= 17 && hour < 20) {
        // evening: warm sunset blend
        color1 = '#1E1B2F';
        color2 = '#2A1E2F';
        color3 = '#3A2436';
        gradientAngle = 160;
      } else {
        // night: deep cosmic
        color1 = '#030712';
        color2 = '#0A0F1F';
        color3 = '#020617';
        gradientAngle = 200;
      }
      document.body.style.background = `radial-gradient(circle at 30% 40%, ${color1}, ${color2}, ${color3})`;
      // smooth transition
      document.body.style.transition = 'background 1.2s ease';
    }
    
    // initial call and set interval for background (every 5 minutes just for smooth shift)
    updateDynamicBackground();
    setInterval(updateDynamicBackground, 300000); // every 5 min
    
    // also add additional fun: subtle pulse to the active badge (already has pulseLive)
    
    // set interval for clock sync (every second)
    let intervalId = setInterval(updateClock, 1000);
    updateClock(); // immediate render
    
    // cleanup event
    window.addEventListener('beforeunload', () => {
      if (intervalId) clearInterval(intervalId);
    });
    
    // extra smoothness: sync with system time instantly on visibility change
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        updateClock(); // re-sync immediately when tab becomes active
      }
    });
    
    // small customization: add a tooltip effect to indicate each color meaning? optional but adds modern vibe
    const hourBlock = document.getElementById('hoursBlock');
    const minuteBlock = document.getElementById('minutesBlock');
    const secondBlock = document.getElementById('secondsBlock');
    if (hourBlock) hourBlock.setAttribute('aria-label', 'Hours · Cyan Gradient');
    if (minuteBlock) minuteBlock.setAttribute('aria-label', 'Minutes · Violet Fusion');
    if (secondBlock) secondBlock.setAttribute('aria-label', 'Seconds · Amber Blaze');
    
    // we can also dynamically update the colon colors if we want but default elegant style works perfectly.
    // Also ensure that the seconds group doesn't overflow and respects the vibrant colors.
    console.log('🌈 Multicolor Digital Clock Active — Hours: Cyan, Minutes: Purple, Seconds: Amber/Rose');
  })();
</script>
</body>
</html>
