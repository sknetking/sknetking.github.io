
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CHRONO SYNC | Multicolor Digital Clock with PiP Mode</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0B1120, #030712);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', 'Segoe UI', 'SF Pro Display', system-ui, -apple-system, 'Poppins', monospace;
      padding: 1.5rem;
      transition: background 1.2s ease;
      position: relative;
    }

    /* main glassmorphic container */
    .clock-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(18px);
      border-radius: 3.5rem;
      padding: 2rem 2.8rem;
      box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 0 1px rgba(56, 189, 248, 0.2);
      transition: all 0.25s ease;
      border: 1px solid rgba(56, 189, 248, 0.25);
    }

    .clock-container:hover {
      border-color: rgba(168, 85, 247, 0.4);
      box-shadow: 0 40px 70px -18px black, 0 0 0 1.5px rgba(168, 85, 247, 0.3);
    }

    /* main digit row */
    .clock-face {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.25rem;
      flex-wrap: wrap;
      padding: 0.5rem 0.2rem;
    }

    .time-unit {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
    }

    .digits {
      font-size: 7rem;
      font-weight: 700;
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* distinct color themes for HOUR, MINUTE, SECOND */
    .hour-digits {
      background: linear-gradient(135deg, #67E8F9 0%, #2DD4BF 40%, #06B6D4 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
    }

    .minute-digits {
      background: linear-gradient(135deg, #C084FC 0%, #A855F7 45%, #D946EF 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    .second-digits {
      background: linear-gradient(145deg, #FBBF24 0%, #F97316 55%, #EF4444 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(249, 115, 22, 0.5);
      font-weight: 650;
    }

    .colon {
      font-size: 6.5rem;
      font-weight: 500;
      margin: 0 0.3rem;
      background: linear-gradient(145deg, #E2E8F0, #94A3B8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(148, 163, 184, 0.5);
      animation: softPulse 1.8s infinite ease-in-out;
    }

    .seconds-group .digits {
      font-size: 5.8rem;
      font-weight: 650;
    }

    /* bottom panel: date and status badges */
    .meta-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.8rem;
      gap: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .date-box {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.5rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(103, 232, 249, 0.4);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      color: #CBD5E1;
      font-family: 'Inter', monospace;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .day-name {
      background: linear-gradient(110deg, #1E293B, #0F172A);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #A5F3FC;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 0.5px solid #22D3EE40;
    }

    .date-num {
      font-weight: 600;
      background: linear-gradient(135deg, #F0F9FF, #BAE6FD);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-feature-settings: "tnum";
    }

    .separator-dot {
      width: 5px;
      height: 5px;
      background: #38BDF8;
      border-radius: 50%;
      display: inline-block;
      opacity: 0.7;
      box-shadow: 0 0 4px #38BDF8;
    }

    .indicator {
      display: flex;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(168, 85, 247, 0.4);
    }

    .badge {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge.period-badge {
      background: linear-gradient(145deg, #FDE047, #FACC15);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .badge.live-badge {
      color: #34D399;
      text-shadow: 0 0 3px #059669;
      font-weight: 600;
      animation: pulseLive 1.2s infinite;
    }

    /* PiP Button Style */
    .pip-button-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 1000;
    }

    .pip-btn {
      background: linear-gradient(105deg, #1e293b, #0f172a);
      border: 1px solid rgba(56, 189, 248, 0.5);
      backdrop-filter: blur(12px);
      padding: 0.9rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      font-family: 'Inter', system-ui;
    }

    .pip-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #2d3a5e, #1e293b);
      border-color: #a855f7;
      box-shadow: 0 15px 30px -8px black;
    }

    .pip-btn:active {
      transform: translateY(1px);
    }

    /* status toast message */
    .toast-msg {
      position: fixed;
      bottom: 100px;
      right: 28px;
      background: #0f172ae0;
      backdrop-filter: blur(16px);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      color: #cbd5e6;
      border-left: 3px solid #38bdf8;
      pointer-events: none;
      z-index: 1001;
      font-family: monospace;
      transition: opacity 0.2s;
      opacity: 0;
      white-space: nowrap;
    }

    @keyframes softPulse {
      0% { opacity: 0.6; text-shadow: 0 0 2px #94A3B8; }
      50% { opacity: 1; text-shadow: 0 0 12px #A5F3FC; }
      100% { opacity: 0.6; text-shadow: 0 0 2px #94A3B8; }
    }

    @keyframes pulseLive {
      0% { opacity: 0.7; text-shadow: 0 0 0px #34D399; }
      100% { opacity: 1; text-shadow: 0 0 5px #34D399; }
    }

    .second-flash {
      filter: brightness(1.3) drop-shadow(0 0 6px #F97316);
      transition: filter 0.07s ease;
    }

    /* responsive adjustments */
    @media (max-width: 780px) {
      .clock-container { padding: 1.6rem 2rem; }
      .digits { font-size: 5rem; }
      .colon { font-size: 4.5rem; margin: 0 0.15rem; }
      .seconds-group .digits { font-size: 4rem; }
      .date-box { font-size: 0.85rem; padding: 0.4rem 1rem; }
      .pip-btn { padding: 0.7rem 1.2rem; font-size: 0.85rem; }
      .toast-msg { bottom: 90px; right: 20px; font-size: 0.7rem; }
    }

    @media (max-width: 580px) {
      .clock-container { padding: 1.2rem 1.5rem; border-radius: 2.5rem; }
      .digits { font-size: 3.8rem; }
      .colon { font-size: 3.2rem; }
      .seconds-group .digits { font-size: 3rem; }
      .pip-btn { padding: 0.6rem 1rem; gap: 0.4rem; }
      .toast-msg { bottom: 80px; }
    }

    .time-unit:hover .digits {
      filter: brightness(1.05);
      transition: 0.15s;
    }
  </style>
</head>
<body>
<div class="clock-container" id="mainClockContainer">
  <div class="clock-face">
    <div class="time-unit" id="hoursBlock">
      <span class="digits hour-digits" id="hours">00</span>
    </div>
    <span class="colon" id="colon1">:</span>
    <div class="time-unit" id="minutesBlock">
      <span class="digits minute-digits" id="minutes">00</span>
    </div>
    <span class="colon" id="colon2">:</span>
    <div class="time-unit seconds-group" id="secondsBlock">
      <span class="digits second-digits" id="seconds">00</span>
    </div>
  </div>
  
  <div class="meta-panel">
    <div class="date-box" id="dateBox">
      <span class="day-name" id="weekday">MON</span>
      <span class="separator-dot"></span>
      <span class="date-num" id="fullDate">Jan 01, 2026</span>
    </div>
    <div class="indicator" id="sessionIndicator">
      <span class="badge period-badge" id="amPmLabel">AM</span>
      <span class="badge live-badge" id="liveStatus">● LIVE</span>
    </div>
  </div>
</div>

<!-- PiP Button + Toast -->
<div class="pip-button-container">
  <button class="pip-btn" id="pipLaunchBtn">
    <span>🪟</span> <span>Clock in PiP</span>
  </button>
</div>
<div id="pipToast" class="toast-msg">✨ PiP mode ready</div>

<script>
  (function() {
    // DOM elements for clock
    const hoursElem = document.getElementById('hours');
    const minutesElem = document.getElementById('minutes');
    const secondsElem = document.getElementById('seconds');
    const weekdayElem = document.getElementById('weekday');
    const fullDateElem = document.getElementById('fullDate');
    const amPmLabel = document.getElementById('amPmLabel');
    
    // PiP elements
    const pipBtn = document.getElementById('pipLaunchBtn');
    const toastEl = document.getElementById('pipToast');
    
    let pipWindowRef = null;          // reference to PiP window
    let pipClockInterval = null;      // interval inside PiP (to sync time)
    
    // Helper: format two digits
    function formatTwoDigits(num) {
      return num < 10 ? '0' + num : '' + num;
    }
    
    function getWeekdayShort(date) {
      const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      return weekdays[date.getDay()];
    }
    
    function getFormattedDate(date) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const month = months[date.getMonth()];
      const day = date.getDate();
      const year = date.getFullYear();
      return `${month} ${day}, ${year}`;
    }
    
    function updateAmPmIndicator(hours24) {
      const period = hours24 >= 12 ? 'PM' : 'AM';
      if (amPmLabel) amPmLabel.textContent = period;
    }
    
    let lastSecondValue = -1;
    function applySecondFlash(secSpan) {
      if (!secSpan) return;
      secSpan.classList.add('second-flash');
      setTimeout(() => {
        if (secSpan) secSpan.classList.remove('second-flash');
      }, 120);
      const colon1 = document.getElementById('colon1');
      const colon2 = document.getElementById('colon2');
      if (colon1 && colon2) {
        colon1.style.transform = 'scale(1.02)';
        colon2.style.transform = 'scale(1.02)';
        setTimeout(() => {
          if (colon1) colon1.style.transform = '';
          if (colon2) colon2.style.transform = '';
        }, 100);
      }
    }
    
    // Main update for main page clock
    function updateClock() {
      const now = new Date();
      let hours24 = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      
      hoursElem.textContent = formatTwoDigits(hours24);
      minutesElem.textContent = formatTwoDigits(minutes);
      secondsElem.textContent = formatTwoDigits(seconds);
      
      updateAmPmIndicator(hours24);
      
      const weekdayStr = getWeekdayShort(now);
      const fullDateStr = getFormattedDate(now);
      if (weekdayElem) weekdayElem.textContent = weekdayStr;
      if (fullDateElem) fullDateElem.textContent = fullDateStr;
      
      applySecondFlash(secondsElem);
    }
    
    // Dynamic background shift (original)
    function updateDynamicBackground() {
      const now = new Date();
      const hour = now.getHours();
      let color1, color2, color3;
      if (hour >= 6 && hour < 12) {
        color1 = '#0A1128'; color2 = '#142850'; color3 = '#0C1B33';
      } else if (hour >= 12 && hour < 17) {
        color1 = '#0B132B'; color2 = '#1C2541'; color3 = '#2A1E3C';
      } else if (hour >= 17 && hour < 20) {
        color1 = '#1E1B2F'; color2 = '#2A1E2F'; color3 = '#3A2436';
      } else {
        color1 = '#030712'; color2 = '#0A0F1F'; color3 = '#020617';
      }
      document.body.style.background = `radial-gradient(circle at 30% 40%, ${color1}, ${color2}, ${color3})`;
      document.body.style.transition = 'background 1.2s ease';
    }
    
    // Show toast message
    function showToast(message, isError = false) {
      if (!toastEl) return;
      toastEl.textContent = message;
      toastEl.style.opacity = '1';
      toastEl.style.borderLeftColor = isError ? '#ef4444' : '#38bdf8';
      setTimeout(() => {
        if (toastEl) toastEl.style.opacity = '0';
      }, 2800);
    }
    
    // ---------- BUILD FULL PiP CLOCK HTML (independent + realtime) ----------
    function getPipClockHTML() {
      // This returns the full HTML/CSS/JS for the floating clock window.
      // It replicates the multicolor design, but optimized for PiP (smaller, compact)
      return `<!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chrono Sync · Floating Clock</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
          body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #0B1120, #030712);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, monospace;
            padding: 1rem;
            transition: background 1s;
          }
          .pip-clock-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 2.2rem;
            padding: 1.2rem 1.8rem;
            box-shadow: 0 20px 35px -12px black, inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(56, 189, 248, 0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
          }
          .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.1rem;
            flex-wrap: wrap;
          }
          .digits {
            font-size: 4rem;
            font-weight: 800;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
          }
          .hour-digits {
            background: linear-gradient(135deg, #67E8F9, #2DD4BF, #06B6D4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
          }
          .minute-digits {
            background: linear-gradient(135deg, #C084FC, #A855F7, #D946EF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
          }
          .second-digits {
            background: linear-gradient(145deg, #FBBF24, #F97316, #EF4444);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
          }
          .colon {
            font-size: 3.5rem;
            font-weight: 500;
            margin: 0 0.2rem;
            background: linear-gradient(145deg, #E2E8F0, #94A3B8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: softPulse 1.5s infinite;
          }
          .meta-info {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 3rem;
            padding: 0.4rem 1rem;
            backdrop-filter: blur(4px);
          }
          .date-text {
            font-size: 0.8rem;
            color: #A5F3FC;
            font-weight: 500;
          }
          .ampm-badge {
            background: linear-gradient(145deg, #FDE047, #FACC15);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: bold;
            font-size: 0.8rem;
          }
          .close-pip-btn {
            background: #1e293b;
            border: 1px solid #ef444480;
            margin-top: 1rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: #fca5a5;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
          }
          .close-pip-btn:hover {
            background: #2d1f2a;
            border-color: #ef4444;
            color: white;
          }
          @keyframes softPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; text-shadow: 0 0 5px #a5f3fc; }
          }
          @media (max-width: 450px) {
            .digits { font-size: 2.8rem; }
            .colon { font-size: 2.5rem; }
            .pip-clock-card { padding: 1rem; }
          }
        </style>
      </head>
      <body>
      <div class="pip-clock-card">
        <div class="clock-display">
          <span class="digits hour-digits" id="pipHours">00</span>
          <span class="colon">:</span>
          <span class="digits minute-digits" id="pipMinutes">00</span>
          <span class="colon">:</span>
          <span class="digits second-digits" id="pipSeconds">00</span>
        </div>
        <div class="meta-info">
          <span class="date-text" id="pipDate">Loading...</span>
          <span class="ampm-badge" id="pipAmPm">AM</span>
        </div>
        <button class="close-pip-btn" id="closePipBtn">✖ Close PiP Window</button>
      </div>
      <script>
        // Clock update inside PiP window
        function updatePipClock() {
          const now = new Date();
          let h = now.getHours();
          const m = now.getMinutes();
          const s = now.getSeconds();
          const hoursStr = h < 10 ? '0' + h : '' + h;
          const minutesStr = m < 10 ? '0' + m : '' + m;
          const secondsStr = s < 10 ? '0' + s : '' + s;
          const pipHours = document.getElementById('pipHours');
          const pipMinutes = document.getElementById('pipMinutes');
          const pipSeconds = document.getElementById('pipSeconds');
          if (pipHours) pipHours.textContent = hoursStr;
          if (pipMinutes) pipMinutes.textContent = minutesStr;
          if (pipSeconds) pipSeconds.textContent = secondsStr;
          // update AM/PM
          const period = h >= 12 ? 'PM' : 'AM';
          const ampmSpan = document.getElementById('pipAmPm');
          if (ampmSpan) ampmSpan.textContent = period;
          // update date
          const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
          const dateStr = weekdays[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
          const dateSpan = document.getElementById('pipDate');
          if (dateSpan) dateSpan.textContent = dateStr;
        }
        updatePipClock();
        const pipInterval = setInterval(updatePipClock, 1000);
        // close button inside PiP
        const closeBtn = document.getElementById('closePipBtn');
        if (closeBtn) {
          closeBtn.addEventListener('click', () => {
            window.close();
          });
        }
        window.addEventListener('beforeunload', () => {
          if (pipInterval) clearInterval(pipInterval);
        });
      <\/script>
      </body>
      </html>`;
    }
    
    // ---------- LAUNCH PiP with Clock ----------
    async function launchClockInPip() {
      // Check support for Document Picture-in-Picture API
      if (!('documentPictureInPicture' in window)) {
        showToast('⚠️ PiP not supported in this browser (need Chrome/Edge 116+)', true);
        return;
      }
      
      // Close existing PiP if already open
      if (pipWindowRef && !pipWindowRef.closed) {
        pipWindowRef.close();
        pipWindowRef = null;
        if (pipClockInterval) {
          clearInterval(pipClockInterval);
          pipClockInterval = null;
        }
      }
      
      try {
        // Request PiP window with compact size suitable for clock (mobile-friendly)
        const pipWindow = await window.documentPictureInPicture.requestWindow({
          width: 360,
          height: 240,
          preferInitialWindowPlacement: true,
        });
        pipWindowRef = pipWindow;
        
        // Write full clock HTML into PiP window
        const pipHtml = getPipClockHTML();
        pipWindow.document.open();
        pipWindow.document.write(pipHtml);
        pipWindow.document.close();
        
        // handle pagehide to cleanup reference
        pipWindow.addEventListener('pagehide', () => {
          if (pipWindowRef === pipWindow) {
            pipWindowRef = null;
          }
          showToast('🪟 PiP clock closed');
        });
        
        showToast('✨ Clock now floating! Drag & resize');
      } catch (err) {
        console.error('PiP error:', err);
        showToast('❌ Failed to open PiP: ' + err.message, true);
      }
    }
    
    // Cleanup PiP when main page unloads
    window.addEventListener('beforeunload', () => {
      if (pipWindowRef && !pipWindowRef.closed) {
        pipWindowRef.close();
      }
    });
    
    // Event listener for PiP button
    if (pipBtn) {
      pipBtn.addEventListener('click', launchClockInPip);
    }
    
    // Initialize main clock and background updates
    let mainInterval = setInterval(updateClock, 1000);
    updateClock();
    updateDynamicBackground();
    setInterval(updateDynamicBackground, 300000);
    
    // Sync when page becomes visible again
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) updateClock();
    });
    
    // additional tooltip attributes
    const hourBlock = document.getElementById('hoursBlock');
    const minuteBlock = document.getElementById('minutesBlock');
    const secondBlock = document.getElementById('secondsBlock');
    if (hourBlock) hourBlock.setAttribute('aria-label', 'Hours · Cyan Gradient');
    if (minuteBlock) minuteBlock.setAttribute('aria-label', 'Minutes · Violet Fusion');
    if (secondBlock) secondBlock.setAttribute('aria-label', 'Seconds · Amber Blaze');
    
    // display supported version
    if ('documentPictureInPicture' in window) {
      showToast('✅ PiP ready — click "Clock in PiP"', false);
      setTimeout(() => {
        if (toastEl) toastEl.style.opacity = '0';
      }, 2000);
    } else {
      showToast('⚠️ Browser does not support Document PiP (Chrome 116+ required)', true);
    }
  })();
</script>
</body>
</html>
