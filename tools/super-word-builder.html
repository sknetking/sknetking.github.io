    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Word Builder!</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>

    <style>
       
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f9ff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        
        h1 {
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }
        
        .game-area {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background: #e3f2fd;
            padding: 8px 12px;
            border-radius: 20px;
        }
        
        .letters-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            padding: 20px;
            background-color: #fff9e6;
            border-radius: 10px;
            min-height: 80px;
        }
        
        .letter {
            width: 60px;
            height: 60px;
            background-color: #ffd166;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            cursor: move;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            user-select: none;
        }
        
        .letter:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        .word-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 10px;
            min-height: 80px;
        }
        
        .word-box {
            width: 60px;
            height: 60px;
            background-color: white;
            border: 3px dashed #4dabf7;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            transition: all 0.3s;
        }
        
        .word-box.highlight {
            background-color: #d0ebff;
            border-color: #228be6;
        }
        
        .word-box.filled {
            border-style: solid;
            background-color: #fff;
        }
        
        .buttons {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-new {
            background-color: #51cf66;
            color: white;
        }
        
        .btn-new:hover {
            background-color: #40c057;
            transform: scale(1.05);
        }
        
        .btn-reset {
            background-color: #ff6b6b;
            color: white;
        }
        
        .btn-reset:hover {
            background-color: #fa5252;
            transform: scale(1.05);
        }
        
        .btn-settings {
            background-color: #7950f2;
            color: white;
        }
        
        .btn-settings:hover {
            background-color: #6741d9;
            transform: scale(1.05);
        }
        
        .message {
            margin: 20px 0;
            padding: 15px;
            font-size: 20px;
            min-height: 30px;
            color: #228be6;
            font-weight: bold;
        }
        
        .success {
            color: #51cf66;
            animation: bounce 0.5s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .hint-area {
            margin: 10px 0;
            font-style: italic;
            color: #666;
            min-height: 20px;
        }
        
        /* Popup styles */
        .popup-overlay {
               position:fixed;
                left: 50%;
                top: 50%;
                -ms-transform: translate(-50%,-50%);
                -moz-transform:translate(-50%,-50%);
                -webkit-transform: translate(-50%,-50%);
                 transform: translate(-50%,-50%);
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
.popup-content img{

        .popup-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: popIn 0.4s;
          max-width:100%;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
          .close-popup {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .close-popup:hover {
            color:red;
            transform: scale(1.2);
        }
        
        select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid #4dabf7;
            font-family: 'Comic Sans MS', cursive;
            background-color: white;
        }
        
        .hint-btn {
            background-color: #fcc419;
            color: #333;
        }
        
        .hint-btn:hover {
            background-color: #fab005;
        }
        
        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;

            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
        }
     
 </style>

<body>
    <div class="game-area">
        <h1>Super Word Builder!</h1>
        <p class="subtitle">Drag letters to build words and learn new vocabulary!</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="3">Easy (3 letters)</option>
                    <option value="4" selected>Medium (4 letters)</option>
                    <option value="5">Hard (5 letters)</option>
                    <option value="6">Expert (6 letters)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="category">Category:</label>
                <select id="category">
                    <option value="animals">Animals</option>
                    <option value="food">Food</option>
                    <option value="objects">Objects</option>
                    <option value="nature">Nature</option>
                    <option value="random" selected>Random</option>
                </select>
            </div>
        </div>
        
        <div class="word-container" id="word-slots">
            <!-- Word boxes will be generated by JavaScript -->
        </div>
        
        <div class="hint-area" id="hint"></div>
        
        <div class="letters-container" id="letter-pool">
            <!-- Letters will be generated by JavaScript -->
        </div>
        
        <div class="buttons">
            <button class="btn btn-new" id="new-word">New Word</button>
            <button class="btn btn-reset" id="reset">Reset</button>
            <button class="btn btn-settings hint-btn" id="hint-btn">Hint</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>

    <!-- Popup for completed word -->
    <div class="popup-overlay" id="popup">
        <div class="popup-content">
            <span class="close-popup" id="close-popup">&times;</span>
            <h2 id="popup-title">Great Job!</h2>
            <p id="popup-word"></p>
            <img src="" class="popup-image" id="popup-image" alt="Word image">
            <p id="popup-definition"></p>
        </div>
    </div>

    <!-- Sound toggle button -->
    <div class="sound-toggle" id="sound-toggle">
        <svg id="sound-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#4dabf7">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path>
        </svg>
    </div>

    <script>
        $(function() {
            // Sound effects
            const sounds = {
                dragStart: new Audio('https://cdn.freesound.org/previews/742/742819_2364780-lq.mp3'),
                drop: new Audio('https://cdn.freesound.org/previews/740/740218_2278166-lq.mp3'),
                success: new Audio('https://cdn.freesound.org/previews/613/613163_12946258-lq.mp3'),
                error: new Audio('https://cdn.freesound.org/previews/350/350981_5450487-lq.mp3')
            };
            
            // Set sound volume
            Object.values(sounds).forEach(sound => {
                sound.volume = 0.3;
            });
            
            // Sound toggle state
            let soundEnabled = true;
            
            // Toggle sound
            $("#sound-toggle").click(function() {
                soundEnabled = !soundEnabled;
                const icon = $("#sound-icon");
                if (soundEnabled) {
                    icon.css("fill", "#4dabf7");
                } else {
                    icon.css("fill", "#ccc");
                }
            });
            
            // Play sound with check
            function playSound(sound) {
                if (soundEnabled) {
                    sound.currentTime = 0; // Rewind to start
                    sound.play().catch(e => console.log("Sound play prevented:", e));
                }
            }
            
            // Fallback images for when primary images fail to load
            const fallbackImages = {
                animals: "https://cdn.pixabay.com/photo/2016/12/13/05/15/puppy-1903313_640.jpg",
                food: "https://cdn.pixabay.com/photo/2014/04/05/11/39/food-316578_640.jpg",
                objects: "https://cdn.pixabay.com/photo/2017/07/10/23/43/question-mark-2492009_640.jpg",
                nature: "https://cdn.pixabay.com/photo/2015/12/01/20/28/road-1072823_640.jpg",
                random: "https://cdn.pixabay.com/photo/2016/11/29/08/41/apple-1868496_640.jpg"
            };
            
            // Word database with reliable image URLs
 const wordDatabase = {
    animals: [
        {word: "CAT", hint: "A small furry pet that meows", image: "https://cdn.pixabay.com/photo/2017/07/25/01/22/cat-2536662_640.jpg", fact: "Cats sleep for about 13 to 16 hours a day."},
        {word: "DOG", hint: "Man's best friend", image: "https://cdn.pixabay.com/photo/2016/12/13/05/15/puppy-1903313_640.jpg", fact: "Dogs can learn over 100 words and gestures."},
        {word: "FISH", hint: "Swims in water and has gills", image: "https://cdn.pixabay.com/photo/2016/12/31/21/22/discus-fish-1943755_640.jpg", fact: "There are over 30,000 species of fish."},
        {word: "BIRD", hint: "Flies in the sky with wings", image: "https://cdn.pixabay.com/photo/2017/02/07/16/47/kingfisher-2046453_640.jpg", fact: "Birds have hollow bones to help them fly."},
        {word: "BEAR", hint: "Large furry animal that hibernates", image: "https://cdn.pixabay.com/photo/2017/07/18/18/24/bear-2516873_640.jpg", fact: "Bears have an excellent sense of smell."},
        {word: "FROG", hint: "Jumps and says 'ribbit'", image: "https://cdn.pixabay.com/photo/2017/04/30/19/42/frog-2273868_640.jpg", fact: "Frogs absorb water through their skin."},
        {word: "DEER", hint: "Has antlers and lives in forests", image: "https://cdn.pixabay.com/photo/2017/09/23/18/30/deer-2780144_640.jpg", fact: "Only male deer grow antlers."},
        {word: "WOLF", hint: "Howls at the moon", image: "https://cdn.pixabay.com/photo/2017/01/16/19/54/wolf-1985518_640.jpg", fact: "Wolves live and hunt in packs."},
        {word: "LION", hint: "Known as the king of the jungle", image: "https://cdn.pixabay.com/photo/2016/11/22/19/32/lion-1854119_640.jpg", fact: "Lions live in groups called prides."},
        {word: "ZEBRA", hint: "Black and white striped animal", image: "https://cdn.pixabay.com/photo/2016/11/21/16/03/zebra-1844130_640.jpg", fact: "Every zebra has a unique pattern of stripes."}
    ],
    food: [
        {word: "APPLE", hint: "A crunchy fruit that grows on trees", image: "https://cdn.pixabay.com/photo/2016/01/05/13/58/apple-1122537_640.jpg", fact: "Apples float in water because they are 25% air."},
        {word: "BREAD", hint: "Made from flour and baked in oven", image: "https://cdn.pixabay.com/photo/2014/07/22/09/59/bread-399286_640.jpg", fact: "Bread is one of the oldest prepared foods."},
        {word: "PIZZA", hint: "Round food with cheese and toppings", image: "https://cdn.pixabay.com/photo/2017/12/09/08/18/pizza-3007395_640.jpg", fact: "The Margherita pizza was created in honor of a queen."},
        {word: "SALAD", hint: "Healthy mix of vegetables", image: "https://cdn.pixabay.com/photo/2017/09/16/19/21/salad-2756467_640.jpg", fact: "The word salad comes from the Latin word 'sal' meaning salt."},
        {word: "PASTA", hint: "Italian food made from dough", image: "https://cdn.pixabay.com/photo/2018/07/18/19/12/pasta-3547078_640.jpg", fact: "There are over 600 shapes of pasta worldwide."},
        {word: "GRAPE", hint: "Small fruit that grows in bunches", image: "https://cdn.pixabay.com/photo/2016/11/21/12/42/grapes-1841745_640.jpg", fact: "Grapes can be used to make wine and raisins."},
        {word: "EGGS", hint: "Comes from hens and used in baking", image: "https://cdn.pixabay.com/photo/2014/12/21/23/28/eggs-575863_640.jpg", fact: "Eggs contain every vitamin except vitamin C."}
    ],
    objects: [
        {word: "BOOK", hint: "Contains pages you can read", image: "https://cdn.pixabay.com/photo/2016/09/10/17/18/book-1659717_640.jpg", fact: "The oldest known book is over 1,200 years old."},
        {word: "CHAIR", hint: "You sit on this furniture", image: "https://cdn.pixabay.com/photo/2017/01/09/12/49/chair-1966335_640.jpg", fact: "The oldest chairs were used by ancient Egyptians."},
        {word: "PHONE", hint: "You use it to call people", image: "https://cdn.pixabay.com/photo/2014/08/29/14/53/iphone-430414_640.jpg", fact: "The first mobile phone weighed over 1kg."},
        {word: "LAMP", hint: "Gives light in a room", image: "https://cdn.pixabay.com/photo/2017/08/05/11/16/lamp-2583603_640.jpg", fact: "Oil lamps were used before electricity was invented."},
        {word: "CLOCK", hint: "Tells the time", image: "https://cdn.pixabay.com/photo/2014/03/26/22/35/clock-298556_640.jpg", fact: "The world's oldest working clock is over 600 years old."},
        {word: "PEN", hint: "Used for writing on paper", image: "https://cdn.pixabay.com/photo/2017/01/11/11/33/pen-1970927_640.jpg", fact: "The ballpoint pen was invented in 1938."}
    ],
    nature: [
        {word: "TREE", hint: "Has leaves and grows tall", image: "https://cdn.pixabay.com/photo/2016/11/23/17/24/tree-1853505_640.jpg", fact: "Trees can live for thousands of years."},
        {word: "FLOWER", hint: "Colorful plant that blooms", image: "https://cdn.pixabay.com/photo/2018/01/29/07/11/flower-3115353_640.jpg", fact: "Some flowers only bloom once a year."},
        {word: "SUN", hint: "Gives us light and warmth", image: "https://cdn.pixabay.com/photo/2017/11/04/08/14/sun-2917477_640.jpg", fact: "The sun is about 4.6 billion years old."},
        {word: "MOON", hint: "Shines at night in the sky", image: "https://cdn.pixabay.com/photo/2017/08/30/01/05/moon-2694769_640.jpg", fact: "The moon has no atmosphere or wind."},
        {word: "RAIN", hint: "Falls from clouds and waters the earth", image: "https://cdn.pixabay.com/photo/2014/11/21/17/27/rain-540526_640.jpg", fact: "Raindrops fall at a speed of about 22 km/h."},
        {word: "SNOW", hint: "Falls as white crystals in winter", image: "https://cdn.pixabay.com/photo/2017/01/20/00/30/winter-1997289_640.jpg", fact: "No two snowflakes are exactly alike."}
    ]
};

            
            let currentWord = {};
            let letters = [];
            
            // Initialize the game
            function initGame() {
                // Clear previous state
                $("#letter-pool").empty();
                $("#word-slots").empty();
                $("#message").removeClass("success").text("");
                $("#hint").text("");
                
                // Get selected difficulty and category
                const difficulty = parseInt($("#difficulty").val());
                const category = $("#category").val();
                
                // Get words from selected category or all categories if random
                let wordPool = [];
                if (category === "random") {
                    for (const cat in wordDatabase) {
                        wordPool = wordPool.concat(wordDatabase[cat]);
                    }
                } else {
                    wordPool = wordDatabase[category];
                }
                
                // Filter words by selected difficulty
                wordPool = wordPool.filter(item => item.word.length === difficulty);
                
                // Select a random word from filtered pool
                if (wordPool.length > 0) {
                    currentWord = wordPool[Math.floor(Math.random() * wordPool.length)];
                } else {
                    // Fallback if no words match
                    currentWord = {
                        word: "WORD",
                        hint: "No hint available",
                        image: fallbackImages[category] || fallbackImages.random
                    };
                }
                
                // Create the word boxes
                for (let i = 0; i < currentWord.word.length; i++) {
                    $("<div>").addClass("word-box").attr("id", "slot-" + i).appendTo("#word-slots");
                }
                
                // Create scrambled letters
                letters = scrambleLetters(currentWord.word);
                
                // Add extra random letters to make it more challenging
                const extraLetters = Math.max(2, Math.floor(currentWord.word.length * 0.5));
                for (let i = 0; i < extraLetters; i++) {
                    letters.push(String.fromCharCode(65 + Math.floor(Math.random() * 26)));
                }
                
                // Shuffle all letters again
                letters = shuffleArray(letters);
                
                // Display the letters
                letters.forEach((letter, index) => {
                    $("<div>")
                        .addClass("letter")
                        .attr("data-letter", letter)
                        .attr("id", "letter-" + index)
                        .text(letter)
                        .appendTo("#letter-pool");
                });
                
                // Make letters draggable
                $(".letter").draggable({
                    revert: "invalid",
                    cursor: "move",
                    zIndex: 100,
                    start: function() {
                        $(this).css("opacity", "0.7");
                        playSound(sounds.dragStart);
                    },
                    stop: function() {
                        $(this).css("opacity", "1");
                    }
                });
                
                // Make word boxes droppable
                $(".word-box").droppable({
                    accept: ".letter",
                    hoverClass: "highlight",
                    drop: function(event, ui) {
                        playSound(sounds.drop);
                        
                        // If this box already has a letter, return it to letters container
                        if ($(this).has(".letter").length) {
                            $(this).find(".letter").appendTo("#letter-pool").draggable({
                                revert: "invalid",
                                cursor: "move",
                                start: function() {
                                    $(this).css("opacity", "0.7");
                                    playSound(sounds.dragStart);
                                },
                                stop: function() {
                                    $(this).css("opacity", "1");
                                }
                            });
                        }
                        
                        // Put the dropped letter in this box
                        ui.draggable.appendTo($(this)).css({
                            "position": "relative",
                            "top": "0",
                            "left": "0"
                        });
                        
                        $(this).addClass("filled");
                        checkWord();
                    }
                });
            }
            
            // Scramble the letters of the word
            function scrambleLetters(word) {
                let letters = word.split('');
                return shuffleArray(letters);
            }
            
            // Fisher-Yates shuffle algorithm
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
            
            // Check if the word is correctly formed
            function checkWord() {
                let builtWord = "";
                $(".word-box").each(function() {
                    if ($(this).find(".letter").length) {
                        builtWord += $(this).find(".letter").text();
                    }
                });
                
                if (builtWord.length === currentWord.word.length) {
                    if (builtWord === currentWord.word) {
                        $("#message").addClass("success").text(`Great job! You built the word: ${currentWord.word}`);
                        playSound(sounds.success);
                        showWordPopup();
                    } else {
                        playSound(sounds.error);
                    }
                }
            }
            
            // Show popup with word image
            function showWordPopup() {
                $("#popup-title").text("Great Job!");
                $("#popup-word").text(`You built: ${currentWord.word}`);
                $("#popup-definition").text(currentWord.hint || "");
                
                const popupImage = $("#popup-image");
                popupImage.attr("src", currentWord.image || fallbackImages.random);
                
                // Handle image error
                popupImage.on("error", function() {
                    $(this).attr("src", fallbackImages[$("#category").val()] || fallbackImages.random);
                });
                
                $("#popup").fadeIn();
            }
            
            // Close popup
            $("#close-popup").click(function() {
                $("#popup").fadeOut();
            });
            
            // New word button
            $("#new-word").click(function() {
                initGame();
            });
            
            // Reset button
            $("#reset").click(function() {
                $(".word-box").removeClass("filled").empty();
                $("#letter-pool").empty();
                letters.forEach((letter, index) => {
                    $("<div>")
                        .addClass("letter")
                        .attr("data-letter", letter)
                        .attr("id", "letter-" + index)
                        .text(letter)
                        .appendTo("#letter-pool");
                });
                
                $(".letter").draggable({
                    revert: "invalid",
                    cursor: "move",
                    zIndex: 100,
                    start: function() {
                        $(this).css("opacity", "0.7");
                        playSound(sounds.dragStart);
                    },
                    stop: function() {
                        $(this).css("opacity", "1");
                    }
                });
                
                $("#message").removeClass("success").text("");
                $("#hint").text("");
            });
            
            // Hint button
            $("#hint-btn").click(function() {
                if (currentWord.hint) {
                    $("#hint").text(`Hint: ${currentWord.hint}`);
                    playSound(sounds.drop);
                }
            });
            
            // Change difficulty or category
            $("#difficulty, #category").change(function() {
                initGame();
            });
            
            // Start the game
            initGame();
        });
    </script>
