<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Learning Game</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.1/themes/base/jquery-ui.css">
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }
        .game-area {
            margin-top: 50px;
        }
        h1 {
            font-size: 2.5em;
            color: #4dabf7;
        }
        .alphabet-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            justify-items: center;
            margin-top: 30px;
        }
        .letter-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            font-size: 3em;
            font-weight: bold;
            background-color: #4dabf7;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .letter-box:hover {
            background-color: #3a9bcf;
        }
        .message {
            margin-top: 20px;
            font-size: 1.5em;
            color: #4dabf7;
        }
        /* Auto Play Button Style */
					.autoplay-btn{display:block;}
					.pause-btn, .stop-btn{ display: none; /* Hide initially */}
      .autoplay-btn, .pause-btn, .stop-btn {
            position: fixed;
            bottom: 20px;
            background-color: #4dabf7;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 2em;
            cursor: pointer;
            transition: background-color 0.3s;
           
        }
        .autoplay-btn:hover, .pause-btn:hover, .stop-btn:hover {
            background-color: #3a9bcf;
        }
        .autoplay-btn {
            right: 100px;
        }
        .pause-btn {
            right: 20px;
        }
        .stop-btn {
            right: 180px;
        }
    </style>
</head>
<body>

    <div class="game-area">
        <h1>Alphabet Learning Game</h1>
        <p class="message">Touch a letter to hear its sound!</p>
        
        <div class="alphabet-container" id="alphabet-container">
            <!-- Alphabet boxes will be generated by JavaScript -->
        </div>
    </div>

    <!-- Autoplay, Pause and Stop Buttons -->
    <button class="autoplay-btn" id="autoplay-btn">&#x1F3B5;</button>
    <button class="pause-btn" id="pause-btn">&#x23F8;</button>
    <button class="stop-btn" id="stop-btn">&#x23F9;</button>

    <script>
        $(document).ready(function() {
            // Create alphabet buttons
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            alphabet.forEach(letter => {
                const letterBox = $("<div>")
                    .addClass("letter-box")
                    .text(letter)
                    .attr("id", letter)
                    .click(function() {
                        speakLetter(letter);
                    });
                $("#alphabet-container").append(letterBox);
            });

            // Function to speak the letter using Web Speech API
            function speakLetter(letter) {
                const msg = new SpeechSynthesisUtterance(letter); // Create speech object
                msg.lang = 'en-US'; // Set language to English (US)
                window.speechSynthesis.speak(msg); // Speak the letter
            }

            // Variables to store the interval ID and the current index for autoplay
            let autoplayInterval;
            let currentIndex = 0;
            let isPaused = false;

            // Function to play all letters A-Z with a pause using SpeechSynthesis
            function autoplayLetters() {
                currentIndex = 0; // Start from the first letter
                clearInterval(autoplayInterval); // Clear any previous interval
                autoplayInterval = setInterval(() => {
                    if (currentIndex < alphabet.length && !isPaused) {
                        speakLetter(alphabet[currentIndex]);
                        currentIndex++;
                    } else {
                        clearInterval(autoplayInterval);
                    }
                }, 3000); // 3 seconds between letters
            }

            // Show/Hide buttons dynamically based on state
            function toggleButtons(show) {
                if (show) {
                    $('#autoplay-btn').show(); // Hide play button
                    $('#pause-btn').show();   // Show pause button
                    $('#stop-btn').show();    // Show stop button
                } else {
                    $('#autoplay-btn').show();  // Show play button
                    $('#pause-btn').hide();     // Hide pause button
                    $('#stop-btn').hide();      // Hide stop button
                }
            }

            // Auto play button click event
            $('#autoplay-btn').click(function() {
                toggleButtons(true); // Hide play button and show pause/stop
                autoplayLetters();   // Start the sequence
            });

            // Pause button click event
            $('#pause-btn').click(function() {
                if (isPaused) {
                    isPaused = false;
                    toggleButtons(true); // Show Pause and Stop
                    autoplayLetters(); // Resume the sequence
                } else {
                    isPaused = true;
                    toggleButtons(true); // Show Pause and Stop
                }
            });

            // Stop button click event
            $('#stop-btn').click(function() {
                clearInterval(autoplayInterval); // Stop the auto-play
                isPaused = false; // Reset paused state
                currentIndex = 0; // Reset to start
                toggleButtons(false); // Hide Pause and Stop buttons, show Play
            });

        });
    </script>

</body>
</html>
