<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Link Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f2f2f2;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      word-break: break-all;
      background: #e8f5e9;
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
    }
    .copy-btn {
      background: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>WhatsApp Link Generator</h2>
    <label>Phone Number (with country code):</label>
    <input type="text" id="phone" placeholder="e.g. 919876543210">

    <label>Message (use *bold*, _italic_, ~strikethrough~):</label>
    <textarea id="message" rows="5" placeholder="Hello *bold text* and _italic text_"></textarea>

    <button onclick="generateLink()">Generate Link</button>

    <div id="result" style="display: none;">
      <strong>Generated Link:</strong><br>
      <a id="wa-link" href="#" target="_blank"></a><br>
      <button class="copy-btn" onclick="copyLink()">Copy Link</button>
    </div>
  </div>

  <script>
    function generateLink() {
      const phone = document.getElementById("phone").value.trim();
      let message = document.getElementById("message").value.trim();

      if (!phone || !message) {
        alert("Please enter both phone number and message.");
        return;
      }

      // Encode the message
      const encodedMessage = encodeURIComponent(message);

      const waLink = `https://wa.me/${phone}?text=${encodedMessage}`;

      document.getElementById("wa-link").href = waLink;
      document.getElementById("wa-link").textContent = waLink;
      document.getElementById("result").style.display = "block";
    }

    function copyLink() {
      const linkText = document.getElementById("wa-link").textContent;
      navigator.clipboard.writeText(linkText).then(() => {
        alert("Link copied to clipboard!");
      }).catch(err => {
        alert("Failed to copy: " + err);
      });
    }
  </script>
</body>
</html>
