<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meet — Video Meetings</title>
<meta name="description" content="Simple, secure video meetings with chat, screen share, and reactions." />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --success: #1e8e3e;
    --warning: #f9ab00;
    --danger: #ea4335;
    --bg: #f1f3f4;
    --surface: #ffffff;
    --surface-2: #f8f9fa;
    --border: #dadce0;
    --text: #202124;
    --text-2: #5f6368;
    --text-3: #80868b;
    --shadow-sm: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
    --shadow-md: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
    --radius: 12px;
    --radius-sm: 8px;
    --header-h: 56px;
    --controls-h: 80px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; }

  /* ============ LOBBY ============ */
  .lobby {
    position: fixed; inset: 0; background: var(--surface);
    display: flex; flex-direction: column; z-index: 50;
    overflow-y: auto;
  }
  .lobby-nav {
    height: var(--header-h); padding: 0 24px; display: flex; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 500; color: var(--text); }
  .brand .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), #4285f4);
    display:flex; align-items:center; justify-content:center; color:white;
  }
  .lobby-main {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr;
    gap: 48px; max-width: 1200px; margin: 0 auto; padding: 48px 24px; align-items: center;
  }
  .lobby-hero h1 {
    font-size: clamp(36px, 5vw, 56px); font-weight: 400; line-height: 1.1; letter-spacing: -1px;
    margin-bottom: 16px;
  }
  .lobby-hero h1 .accent { color: var(--primary); }
  .lobby-hero p { color: var(--text-2); font-size: 18px; line-height: 1.5; margin-bottom: 32px; max-width: 480px; }
  .actions { display: flex; flex-direction: column; gap: 12px; max-width: 420px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    height: 48px; padding: 0 24px; border-radius: 24px; border: none;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: background .15s, box-shadow .15s, transform .05s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); box-shadow: var(--shadow-sm); }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-outline { background: white; color: var(--primary); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
  .join-row { display: flex; gap: 8px; }
  .join-row input {
    flex:1; height: 48px; padding: 0 18px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none; transition: border-color .15s, box-shadow .15s;
    background: white;
  }
  .join-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
  .divider { display:flex; align-items:center; gap:12px; color: var(--text-3); font-size: 13px; margin: 8px 0; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background: var(--border); }
  .lobby-visual {
    aspect-ratio: 4/3; border-radius: 24px; background: radial-gradient(circle at 30% 20%, #e8f0fe, #d2e3fc 60%, #aecbfa);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
    box-shadow: var(--shadow-md);
  }
  .lobby-visual i { font-size: 120px; color: var(--primary); opacity: .9; }
  .lobby-visual::after {
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 80% 80%, rgba(255,255,255,.6), transparent 50%);
  }
  .name-input { margin-bottom: 8px; }
  .name-input input {
    width:100%; height: 44px; padding: 0 16px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; outline: none;
  }
  .name-input input:focus { border-color: var(--primary); }

  @media (max-width: 860px) {
    .lobby-main { grid-template-columns: 1fr; padding: 24px; gap: 24px; }
    .lobby-visual { aspect-ratio: 16/9; }
  }

  /* ============ MEETING ============ */
  .meeting { display: none; height: 100vh; flex-direction: column; background: #202124; color: white; }
  .meeting.active { display: flex; }

  .top-bar {
    height: var(--header-h); padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
    background: #202124; color: #e8eaed; border-bottom: 1px solid #3c4043;
  }
  .top-bar .left, .top-bar .right { display:flex; align-items:center; gap: 12px; }
  .meeting-id { font-size: 14px; color: #bdc1c6; display:flex; align-items:center; gap:8px; }
  .meeting-id .id-pill {
    background: #303134; padding: 6px 12px; border-radius: 16px; font-family: monospace; font-size: 13px; color: #e8eaed;
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none;
    color: #e8eaed; cursor: pointer; display:flex; align-items:center; justify-content:center;
    transition: background .15s; font-size: 18px;
  }
  .icon-btn:hover { background: #3c4043; }
  .icon-btn.active { background: var(--primary); color: white; }
  .icon-btn .badge {
    position: absolute; top: 2px; right: 2px;
    background: var(--danger); color: white; font-size: 10px; min-width: 16px; height: 16px;
    border-radius: 8px; display:flex; align-items:center; justify-content:center; padding: 0 4px;
  }
  .icon-btn { position: relative; }

  /* Stage */
  .stage-wrap { flex:1; display:flex; min-height: 0; }
  .stage {
    flex:1; padding: 16px; display: grid; gap: 12px; min-height: 0; min-width: 0;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    grid-auto-rows: 1fr;
    align-content: center;
  }
  .stage.count-1 { grid-template-columns: 1fr; max-width: 1100px; margin: 0 auto; }
  .stage.count-2 { grid-template-columns: 1fr 1fr; }
  .stage.count-screen { grid-template-columns: 3fr 1fr; }

  .tile {
    position: relative; background: #3c4043; border-radius: var(--radius);
    overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm); transition: outline .2s;
    outline: 0 solid transparent;
  }
  .tile.speaking { outline: 3px solid #34a853; }
  .tile video {
    width: 100%; height: 100%; object-fit: cover; background: #202124;
    transform: scaleX(-1);
  }
  .tile.screen video, .tile.remote video { transform: none; }
  .tile .avatar {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--primary); color: white; font-size: 36px; font-weight: 500;
    display:flex; align-items:center; justify-content:center;
  }
  .tile .name-tag {
    position: absolute; left: 12px; bottom: 12px;
    background: rgba(0,0,0,.5); color: white; padding: 6px 10px; border-radius: 6px;
    font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .tile .status {
    position: absolute; top: 12px; right: 12px; display: flex; gap: 6px;
  }
  .tile .status .pill {
    background: rgba(0,0,0,.5); color: white; width: 28px; height: 28px;
    border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:12px;
  }
  .tile .status .pill.danger { background: var(--danger); }
  
  /* Tile Fullscreen option */
  .tile .status .fullscreen-btn {
    background: rgba(0,0,0,.6); color: white; width: 28px; height: 28px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: none; cursor: pointer; transition: background .15s, transform .15s;
  }
  .tile .status .fullscreen-btn:hover { background: var(--primary); transform: scale(1.1); }
  
  .tile:fullscreen {
    max-width: 100% !important;
    max-height: 100% !important;
    aspect-ratio: auto !important;
    background: #202124 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  .tile:fullscreen video {
    object-fit: contain !important;
  }

  .tile .raised {
    position: absolute; top: 12px; left: 12px;
    background: var(--warning); color: #202124; padding: 6px 10px; border-radius: 16px;
    font-size: 13px; display: flex; align-items: center; gap: 6px;
    animation: bounce 1s infinite;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  /* Side panel */
  .side-panel {
    width: 360px; background: var(--surface); color: var(--text);
    display: none; flex-direction: column; border-left: 1px solid #3c4043;
  }
  .side-panel.open { display: flex; }
  .panel-header {
    height: var(--header-h); padding: 0 20px; display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  .panel-header h3 { font-size: 16px; font-weight: 500; }
  .panel-tabs { display:flex; border-bottom: 1px solid var(--border); }
  .panel-tabs button {
    flex:1; padding: 14px; background:none; border:none; cursor:pointer; font-size: 14px;
    color: var(--text-2); font-weight: 500; border-bottom: 2px solid transparent;
  }
  .panel-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }
  .panel-body { flex:1; overflow-y:auto; padding: 16px; }
  .panel-body.no-pad { padding: 0; }

  /* Chat */
  .chat-list { display: flex; flex-direction: column; gap: 12px; padding: 16px; }
  .msg { max-width: 85%; }
  .msg .meta { font-size: 12px; color: var(--text-3); margin-bottom: 4px; display:flex; gap:6px; }
  .msg .bubble {
    background: var(--surface-2); padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.4; word-wrap: break-word;
  }
  .msg.me { align-self: flex-end; }
  .msg.me .bubble { background: var(--primary); color: white; }
  .msg.me .meta { justify-content: flex-end; }
  .msg.sys { align-self: center; }
  .msg.sys .bubble { background: transparent; color: var(--text-3); font-style: italic; font-size: 12px; padding: 4px 8px; }
  .chat-input {
    border-top: 1px solid var(--border); padding: 12px; display:flex; gap: 8px; background: white;
  }
  .chat-input input {
    flex:1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px; outline: none;
    font-size: 14px;
  }
  .chat-input input:focus { border-color: var(--primary); }
  .chat-input button {
    width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary);
    color: white; cursor: pointer;
  }
  .chat-input button:disabled { background: var(--border); cursor: not-allowed; }

  /* People */
  .person {
    display:flex; align-items:center; gap: 12px; padding: 10px 16px; border-radius: 8px;
  }
  .person:hover { background: var(--surface-2); }
  .person .av {
    width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white;
    display:flex; align-items:center; justify-content:center; font-weight: 500; font-size: 14px;
  }
  .person .info { flex:1; }
  .person .info .nm { font-size: 14px; font-weight: 500; }
  .person .info .role { font-size: 12px; color: var(--text-3); }
  .person .ic { display:flex; gap: 6px; color: var(--text-2); }
  .person .ic i.off { color: var(--danger); }
  .invite-box {
    margin: 0 16px 16px; padding: 12px; background: var(--primary-light); border-radius: 8px;
  }
  .invite-box label { font-size: 12px; color: var(--text-2); display:block; margin-bottom: 6px; font-weight: 500; }
  .invite-box .row { display: flex; gap: 6px; }
  .invite-box input { flex:1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 13px; }
  .invite-box button {
    background: var(--primary); color: white; border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 13px;
  }

  /* Bottom controls */
  .controls {
    height: var(--controls-h); padding: 0 24px; background: #202124;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border-top: 1px solid #3c4043;
  }
  .controls .group { display:flex; gap: 8px; align-items: center; }
  .controls .time { color: #bdc1c6; font-size: 14px; }
  .ctrl {
    width: 48px; height: 48px; border-radius: 50%;
    background: #3c4043; color: white; border: none; cursor: pointer;
    display:flex; align-items:center; justify-content:center; font-size: 18px;
    transition: background .15s, transform .05s; position: relative;
  }
  .ctrl:hover { background: #5f6368; }
  .ctrl:active { transform: scale(.95); }
  .ctrl.off { background: var(--danger); }
  .ctrl.off:hover { background: #c5221f; }
  .ctrl.on { background: var(--primary); }
  .ctrl.leave { background: var(--danger); width: 64px; border-radius: 24px; }
  .ctrl.leave:hover { background: #c5221f; }

  /* Reactions overlay */
  .reactions-pop {
    position: absolute; bottom: calc(var(--controls-h) + 8px); left: 50%; transform: translateX(-50%);
    background: #303134; padding: 12px; border-radius: 24px; display: none; gap: 8px;
    box-shadow: var(--shadow-md); z-index: 30;
  }
  .reactions-pop.open { display: flex; }
  .reactions-pop button {
    width: 44px; height: 44px; border-radius: 50%; background: transparent; border: none;
    cursor: pointer; font-size: 22px; transition: background .15s, transform .1s;
  }
  .reactions-pop button:hover { background: #3c4043; transform: scale(1.15); }

  .floating-reactions { position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden; }
  .floating-reactions .em {
    position: absolute; font-size: 40px; bottom: 100px;
    animation: floatUp 3s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(.5); }
    20% { opacity: 1; transform: translateY(-50px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80vh) scale(1); }
  }

  /* Toast */
  .toast-wrap { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 80; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: #303134; color: #e8eaed; padding: 12px 20px; border-radius: 24px;
    font-size: 14px; box-shadow: var(--shadow-md);
    animation: toastIn .3s ease-out;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Settings modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90;
    display: none; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: white; color: var(--text); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 480px; box-shadow: var(--shadow-md);
  }
  .modal h2 { font-size: 20px; font-weight: 500; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 13px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .field select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; background: white;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Mobile */
  @media (max-width: 768px) {
    .meeting-id .label { display: none; }
    .side-panel { position: fixed; right: 0; top: 0; bottom: var(--controls-h); width: 100%; max-width: 360px; z-index: 70; }
    .controls { padding: 0 12px; }
    .ctrl { width: 44px; height: 44px; }
    .ctrl.leave { width: 56px; }
    .stage { padding: 8px; grid-template-columns: 1fr; }
    .stage.count-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOBBY -->
<div class="lobby" id="lobby">
  <nav class="lobby-nav">
    <div class="brand">
      <div class="logo"><i class="fas fa-video"></i></div>
      <span>Meet</span>
    </div>
  </nav>
  <main class="lobby-main">
    <div class="lobby-hero">
      <h1>Video calls<br/>made <span class="accent">simple</span>.</h1>
      <p>Start an instant meeting or join with a code. Crystal-clear video, chat, screen share, and reactions — no downloads required.</p>
      <div class="actions">
        <div class="name-input">
          <input id="lobbyName" type="text" placeholder="Your name" maxlength="40" />
        </div>
        <button class="btn btn-primary" id="newMeetingBtn">
          <i class="fas fa-plus"></i> New meeting
        </button>
        <div class="divider">or</div>
        <div class="join-row">
          <input id="joinCode" type="text" placeholder="Enter meeting code" />
          <button class="btn btn-outline" id="joinBtn">Join</button>
        </div>
      </div>
    </div>
    <div class="lobby-visual">
      <i class="fas fa-video"></i>
    </div>
  </main>
</div>

<!-- MEETING -->
<div class="meeting" id="meeting">
  <div class="top-bar">
    <div class="left">
      <div class="brand" style="color:#e8eaed">
        <div class="logo"><i class="fas fa-video"></i></div>
      </div>
      <div class="meeting-id">
        <span class="label">Meeting code:</span>
        <span class="id-pill" id="meetingIdPill">—</span>
        <button class="icon-btn" id="copyIdBtn" title="Copy code"><i class="fas fa-copy"></i></button>
      </div>
    </div>
    <div class="right">
      <span class="time" id="clock"></span>
    </div>
  </div>

  <div class="stage-wrap">
    <div class="stage" id="stage"></div>
    <aside class="side-panel" id="sidePanel">
      <div class="panel-header">
        <h3 id="panelTitle">People</h3>
        <button class="icon-btn" id="closePanel" style="color:var(--text-2)"><i class="fas fa-times"></i></button>
      </div>
      <div class="panel-tabs">
        <button data-tab="people" class="active"><i class="fas fa-users"></i> People <span id="peopleCount">(1)</span></button>
        <button data-tab="chat"><i class="fas fa-comment"></i> Chat</button>
      </div>
      <div class="panel-body no-pad" id="panelBody">
        <!-- populated by JS -->
      </div>
    </aside>
  </div>

  <div class="reactions-pop" id="reactionsPop">
    <button data-emoji="👍">👍</button>
    <button data-emoji="❤️">❤️</button>
    <button data-emoji="😂">😂</button>
    <button data-emoji="🎉">🎉</button>
    <button data-emoji="👏">👏</button>
    <button data-emoji="😮">😮</button>
    <button data-emoji="🔥">🔥</button>
  </div>

  <div class="controls">
    <div class="group">
      <span class="time" id="clock2"></span>
    </div>
    <div class="group">
      <button class="ctrl on" id="micBtn" title="Mic (m)"><i class="fas fa-microphone"></i></button>
      <button class="ctrl on" id="camBtn" title="Camera (c)"><i class="fas fa-video"></i></button>
      <button class="ctrl" id="screenBtn" title="Share screen"><i class="fas fa-desktop"></i></button>
      <button class="ctrl" id="handBtn" title="Raise hand"><i class="fas fa-hand-paper"></i></button>
      <button class="ctrl" id="reactBtn" title="Reactions"><i class="far fa-smile"></i></button>
      <button class="ctrl leave" id="leaveBtn" title="Leave"><i class="fas fa-phone-slash"></i></button>
    </div>
    <div class="group">
      <button class="ctrl" id="peopleBtn" title="People"><i class="fas fa-users"></i></button>
      <button class="ctrl" id="chatBtn" title="Chat"><i class="fas fa-comment"></i><span class="badge" id="chatBadge" style="display:none">0</span></button>
      <button class="ctrl" id="settingsBtn" title="Settings"><i class="fas fa-cog"></i></button>
    </div>
  </div>
</div>

<div class="floating-reactions" id="floatingReactions"></div>
<div class="toast-wrap" id="toasts"></div>

<!-- Settings Modal -->
<div class="modal-back" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="field">
      <label>Microphone</label>
      <select id="micSelect"></select>
    </div>
    <div class="field">
      <label>Camera</label>
      <select id="camSelect"></select>
    </div>
    <div class="field">
      <label>Speaker</label>
      <select id="spkSelect"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeSettings">Cancel</button>
      <button class="btn btn-primary" id="applySettings">Apply</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ---------- State ----------
  const state = {
    peer: null,
    myId: null,
    myName: "",
    meetingId: null,
    isHost: false,
    localStream: null,
    screenStream: null,
    screenSharing: false,
    micOn: true,
    camOn: true,
    handRaised: false,
    chatOpen: false,
    peopleOpen: false,
    currentTab: "people",
    unreadChat: 0,
    connections: new Map(), // peerId -> { conn (data), call (media), stream, name, micOn, camOn, handRaised, screenSharing }
    messages: [],
    devices: { mic: null, cam: null, spk: null },
    videoEls: new Map(), // id -> <video> reused across renders to preserve audio playback
  };

  // ---------- Helpers ----------
  const $ = (id) => document.getElementById(id);
  const initials = (n) => (n||"?").trim().split(/\s+/).map(s=>s[0]).slice(0,2).join("").toUpperCase();
  const colorFor = (s) => {
    let h=0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) % 360;
    return `hsl(${h} 60% 45%)`;
  };
  const toast = (msg, ms=2400) => {
    const t = document.createElement("div");
    t.className = "toast"; t.textContent = msg;
    $("toasts").appendChild(t);
    setTimeout(()=>t.remove(), ms);
  };
  const genId = () => {
    const s = "abcdefghjkmnpqrstuvwxyz23456789";
    const seg = (n) => Array.from({length:n}, ()=>s[Math.floor(Math.random()*s.length)]).join("");
    return `${seg(3)}-${seg(4)}-${seg(3)}`;
  };
  const updateClock = () => {
    const d = new Date();
    const t = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    $("clock").textContent = t;
    $("clock2").textContent = t + " • " + d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
  };
  setInterval(updateClock, 1000); updateClock();

  // Helper dummy track creators to maintain transceivers when camera/mic access fails or starts off
  function createDummyVideoTrack() {
    const canvas = document.createElement("canvas");
    canvas.width = 640; canvas.height = 480;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const stream = canvas.captureStream(10);
    const track = stream.getVideoTracks()[0];
    track.enabled = false;
    return track;
  }

  function createDummyAudioTrack() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = ctx.createOscillator();
      const dst = ctx.createMediaStreamDestination();
      oscillator.connect(dst);
      const track = dst.stream.getAudioTracks()[0];
      track.enabled = false;
      return track;
    } catch (e) {
      console.warn("Could not create dummy audio track", e);
      return null;
    }
  }

  // Toggle Tile Fullscreen Helper
  const toggleTileFullscreen = (el, btn) => {
    if (!document.fullscreenElement) {
      el.requestFullscreen().then(() => {
        btn.innerHTML = '<i class="fas fa-compress"></i>';
      }).catch(() => {
        toast("Full screen mode is not supported by your browser");
      });
    } else {
      document.exitFullscreen();
    }
  };

  // Reset screen buttons on change
  document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
      document.querySelectorAll(".fullscreen-btn").forEach(b => {
        b.innerHTML = '<i class="fas fa-expand"></i>';
      });
    }
  });

  // ---------- Lobby ----------
  const savedName = localStorage.getItem("meet_name") || "";
  $("lobbyName").value = savedName;

  // Prefill from hash
  const hashCode = location.hash.replace(/^#/, "").trim();
  if (hashCode) $("joinCode").value = hashCode;

  $("newMeetingBtn").addEventListener("click", () => {
    const name = $("lobbyName").value.trim();
    if (!name) { $("lobbyName").focus(); toast("Enter your name first"); return; }
    localStorage.setItem("meet_name", name);
    state.myName = name; state.isHost = true;
    startMeeting(genId(), true);
  });
  $("joinBtn").addEventListener("click", () => {
    const name = $("lobbyName").value.trim();
    const code = $("joinCode").value.trim().toLowerCase();
    if (!name) { $("lobbyName").focus(); toast("Enter your name first"); return; }
    if (!code) { $("joinCode").focus(); toast("Enter a meeting code"); return; }
    localStorage.setItem("meet_name", name);
    state.myName = name; state.isHost = false;
    startMeeting(code, false);
  });
  $("joinCode").addEventListener("keydown", (e) => { if (e.key === "Enter") $("joinBtn").click(); });

  // ---------- Start meeting ----------
  async function startMeeting(meetingId, asHost) {
    state.meetingId = meetingId;
    $("meetingIdPill").textContent = meetingId;
    location.hash = meetingId;

    try {
      state.localStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
    } catch (e) {
      console.warn("getUserMedia failed", e);
      toast("Camera/mic unavailable — joining audio-off");
      state.localStream = new MediaStream();
      try {
        state.localStream.addTrack(createDummyVideoTrack());
        const dummyAudio = createDummyAudioTrack();
        if (dummyAudio) state.localStream.addTrack(dummyAudio);
      } catch (err) {
        console.error("Failed to append dummy WebRTC transceivers", err);
      }
      state.camOn = false; state.micOn = false;
      updateMediaButtons();
    }

    // Host's peer id = meetingId, guests connect to meetingId
    const peerId = asHost ? meetingId : undefined;
    state.peer = new Peer(peerId, { debug: 1 });

    state.peer.on("open", (id) => {
      state.myId = id;
      $("lobby").style.display = "none";
      $("meeting").classList.add("active");
      renderStage();
      renderPanel();
      loadDevices();

      if (!asHost) {
        // Connect to host
        connectToPeer(meetingId);
      } else {
        toast("Meeting started — share the code to invite others");
      }
    });

    state.peer.on("error", (err) => {
      console.error("Peer error", err);
      if (err.type === "unavailable-id") {
        toast("Meeting code already in use");
      } else if (err.type === "peer-unavailable") {
        toast("Could not connect to host — code may be invalid");
      } else {
        toast("Connection error: " + (err.type || err.message));
      }
    });

    // Incoming data connection (chat, signaling, peer list)
    state.peer.on("connection", (conn) => {
      setupDataConn(conn);
    });

    // Incoming media call
    state.peer.on("call", (call) => {
      call.answer(state.localStream);
      attachCall(call);
    });

    window.addEventListener("beforeunload", () => leaveMeeting(false));
  }

  function connectToPeer(remoteId, { silent = false } = {}) {
    if (remoteId === state.myId) return;
    if (state.connections.has(remoteId)) return;
    const conn = state.peer.connect(remoteId, { reliable: true, metadata: { name: state.myName } });
    setupDataConn(conn);
    // Also place a media call
    const call = state.peer.call(remoteId, state.localStream, { metadata: { name: state.myName } });
    attachCall(call);
  }

  function setupDataConn(conn) {
    const entry = ensurePeer(conn.peer);
    entry.conn = conn;
    conn.on("open", () => {
      // Send my hello + (if host) full peer list
      conn.send({
        type: "hello",
        name: state.myName,
        micOn: state.micOn,
        camOn: state.camOn,
        handRaised: state.handRaised,
        screenSharing: state.screenSharing
      });
      if (state.isHost) {
        const list = Array.from(state.connections.keys()).filter(id => id !== conn.peer);
        conn.send({ type: "peer-list", peers: list });
      }
    });
    conn.on("data", (data) => handleData(conn.peer, data));
    conn.on("close", () => removePeer(conn.peer));
    conn.on("error", () => removePeer(conn.peer));
  }

  function attachCall(call) {
    const entry = ensurePeer(call.peer);
    entry.call = call;
    call.on("stream", (stream) => {
      entry.stream = stream;
      renderStage();
    });
    call.on("close", () => removePeer(call.peer));
    call.on("error", () => removePeer(call.peer));
  }

  function ensurePeer(id) {
    if (!state.connections.has(id)) {
      state.connections.set(id, { name: "Guest", micOn: true, camOn: true, handRaised: false, screenSharing: false });
      renderPanel();
    }
    return state.connections.get(id);
  }

  function removePeer(id) {
    if (!state.connections.has(id)) return;
    const e = state.connections.get(id);
    addSystemMsg(`${e.name || "Someone"} left the meeting`);
    state.connections.delete(id);
    const v = state.videoEls.get(id);
    if (v) { try { v.srcObject = null; } catch {} state.videoEls.delete(id); }
    renderStage(); renderPanel();
  }

  function handleData(fromId, data) {
    const entry = ensurePeer(fromId);
    switch (data.type) {
      case "hello":
        entry.name = data.name || "Guest";
        entry.micOn = !!data.micOn;
        entry.camOn = !!data.camOn;
        entry.handRaised = !!data.handRaised;
        entry.screenSharing = !!data.screenSharing;
        addSystemMsg(`${entry.name} joined the meeting`);
        renderStage(); renderPanel();
        break;
      case "peer-list":
        // Connect to all other peers in the meeting
        (data.peers || []).forEach((pid) => connectToPeer(pid, { silent: true }));
        break;
      case "chat":
        pushMsg({ from: entry.name || "Guest", fromId, text: data.text, ts: Date.now(), self: false });
        if (!state.chatOpen || state.currentTab !== "chat") {
          state.unreadChat++; updateChatBadge();
        }
        break;
      case "state":
        entry.micOn = data.micOn;
        entry.camOn = data.camOn;
        entry.handRaised = data.handRaised;
        entry.screenSharing = !!data.screenSharing;
        renderStage(); renderPanel();
        if (data.handRaised && data._announce) addSystemMsg(`${entry.name} raised their hand ✋`);
        break;
      case "reaction":
        spawnReaction(data.emoji);
        break;
    }
  }

  function broadcast(payload) {
    state.connections.forEach((e) => {
      if (e.conn && e.conn.open) {
        try { e.conn.send(payload); } catch {}
      }
    });
  }

  // ---------- Control broadcasters ----------
  function broadcastState(announce=false) {
    broadcast({
      type: "state",
      micOn: state.micOn,
      camOn: state.camOn,
      handRaised: state.handRaised,
      screenSharing: state.screenSharing,
      _announce: announce
    });
  }

  // ---------- Stage rendering ----------
  function renderStage() {
    const stage = $("stage");
    const normalTiles = [];
    const screenTiles = [];

    // Screen share tile (local)
    if (state.screenSharing && state.screenStream) {
      screenTiles.push(screenTile());
    }

    // Local webcam/avatar tile
    normalTiles.push(localTile());

    // Remote tiles sorted into screen share vs normal camera tiles
    state.connections.forEach((e, id) => {
      const tile = remoteTile(id, e);
      if (e.screenSharing) {
        screenTiles.push(tile);
      } else {
        normalTiles.push(tile);
      }
    });

    // Presentation Layout: Screen shares always sorted first (they will occupy the large 3fr grid column)
    const allTiles = [...screenTiles, ...normalTiles];

    stage.innerHTML = "";
    allTiles.forEach(t => stage.appendChild(t));

    const n = allTiles.length;
    const anyScreenSharing = screenTiles.length > 0;

    stage.classList.remove("count-1","count-2","count-screen");
    if (anyScreenSharing) {
      stage.classList.add("count-screen");
    } else if (n === 1) {
      stage.classList.add("count-1");
    } else if (n === 2) {
      stage.classList.add("count-2");
    }
  }

  function tileBase(id, name, stream, opts={}) {
    const div = document.createElement("div");
    div.className = "tile" + (opts.remote ? " remote" : "") + (opts.screen ? " screen" : "");
    div.dataset.id = id;

    // A screen share forces video mode active even if camera is off
    const hasVideo = !!(stream && stream.getVideoTracks().some(t => t.readyState === "live") && (opts.camOn !== false || opts.screen));

    // Reuse a cached <video> per id so audio playback never restarts when the
    // camera is toggled or the stage re-renders.
    let v = state.videoEls.get(id);
    if (!v) {
      v = document.createElement("video");
      v.autoplay = true; v.playsInline = true;
      state.videoEls.set(id, v);
    }
    v.muted = !!opts.muted;

    // Track active video track ID to detect WebRTC track changes (webcam <-> screen share swaps)
    const activeTrack = stream ? stream.getVideoTracks()[0] : null;
    const activeTrackId = activeTrack ? activeTrack.id : null;
    const currentTrackId = v.dataset.trackId;

    if (stream && (v.srcObject !== stream || currentTrackId !== activeTrackId)) {
      v.srcObject = stream;
      if (activeTrackId) {
        v.dataset.trackId = activeTrackId;
      } else {
        delete v.dataset.trackId;
      }
    }

    if (hasVideo) {
      v.play().catch(() => {});
    }

    v.style.display = hasVideo ? "" : "none";
    div.appendChild(v);

    if (!hasVideo) {
      const av = document.createElement("div");
      av.className = "avatar";
      av.style.background = colorFor(name || id);
      av.textContent = initials(name);
      div.appendChild(av);
    }

    const tag = document.createElement("div");
    tag.className = "name-tag";
    tag.innerHTML = `<span>${escapeHtml(name)}${opts.youSuffix ? " (You)" : ""}</span>`;
    div.appendChild(tag);

    const status = document.createElement("div"); status.className = "status";
    if (opts.micOn === false) {
      const p = document.createElement("div"); p.className = "pill danger"; p.innerHTML = '<i class="fas fa-microphone-slash"></i>';
      status.appendChild(p);
    }

    // Toggle fullscreen button for remote presentations
    if (opts.screen) {
      const fsBtn = document.createElement("button");
      fsBtn.className = "fullscreen-btn";
      fsBtn.title = "Toggle Full Screen";
      fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
      fsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleTileFullscreen(div, fsBtn);
      });
      status.appendChild(fsBtn);
    }

    div.appendChild(status);

    if (opts.handRaised) {
      const h = document.createElement("div"); h.className = "raised"; h.innerHTML = '✋ Hand raised';
      div.appendChild(h);
    }
    return div;
  }

  function localTile() {
    return tileBase(state.myId || "me", state.myName, state.localStream, {
      muted: true, youSuffix: true, micOn: state.micOn, camOn: state.camOn, handRaised: state.handRaised
    });
  }

  function remoteTile(id, e) {
    return tileBase(id, e.name || "Guest", e.stream, {
      remote: true, micOn: e.micOn, camOn: e.camOn, handRaised: e.handRaised, screen: e.screenSharing
    });
  }

  function screenTile() {
    const div = document.createElement("div");
    div.className = "tile screen";

    let v = state.videoEls.get("local-screen");
    if (!v) {
      v = document.createElement("video");
      v.autoplay = true; v.playsInline = true; v.muted = true;
      state.videoEls.set("local-screen", v);
    }
    if (v.srcObject !== state.screenStream) {
      v.srcObject = state.screenStream;
    }
    v.play().catch(() => {});
    div.appendChild(v);

    const tag = document.createElement("div");
    tag.className = "name-tag";
    tag.innerHTML = `<i class="fas fa-desktop"></i> ${escapeHtml(state.myName)} is presenting`;
    div.appendChild(tag);

    // Toggle fullscreen button for local presentation
    const status = document.createElement("div");
    status.className = "status";
    const fsBtn = document.createElement("button");
    fsBtn.className = "fullscreen-btn";
    fsBtn.title = "Toggle Full Screen";
    fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
    fsBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleTileFullscreen(div, fsBtn);
    });
    status.appendChild(fsBtn);
    div.appendChild(status);

    return div;
  }

  function escapeHtml(s) { return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ---------- Panel ----------
  $("peopleBtn").addEventListener("click", () => openPanel("people"));
  $("chatBtn").addEventListener("click", () => openPanel("chat"));
  $("closePanel").addEventListener("click", closePanel);
  document.querySelectorAll(".panel-tabs button").forEach(b => {
    b.addEventListener("click", () => openPanel(b.dataset.tab));
  });

  function openPanel(tab) {
    state.chatOpen = true; state.currentTab = tab;
    $("sidePanel").classList.add("open");
    document.querySelectorAll(".panel-tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    $("panelTitle").textContent = tab === "chat" ? "In-call messages" : "People";
    if (tab === "chat") { state.unreadChat = 0; updateChatBadge(); }
    renderPanel();
  }
  function closePanel() {
    state.chatOpen = false;
    $("sidePanel").classList.remove("open");
  }

  function renderPanel() {
    $("peopleCount").textContent = `(${state.connections.size + 1})`;
    const body = $("panelBody");
    if (state.currentTab === "people") {
      body.innerHTML = "";
      // Invite box
      const inv = document.createElement("div");
      inv.className = "invite-box";
      const link = location.origin + location.pathname + "#" + state.meetingId;
      inv.innerHTML = `
        <label>Invite link</label>
        <div class="row">
          <input id="invLink" readonly value="${escapeHtml(link)}" />
          <button id="invCopy"><i class="fas fa-copy"></i></button>
        </div>`;
      body.appendChild(inv);
      inv.querySelector("#invCopy").addEventListener("click", () => copyText(link, "Invite link copied"));

      // People list
      const wrap = document.createElement("div");
      wrap.style.padding = "0 8px 16px";
      wrap.appendChild(personEl(state.myId || "me", state.myName + " (You)", state.micOn, state.camOn, state.handRaised, true));
      state.connections.forEach((e, id) => {
        wrap.appendChild(personEl(id, e.name || "Guest", e.micOn, e.camOn, e.handRaised, false));
      });
      body.appendChild(wrap);
    } else {
      body.innerHTML = "";
      const list = document.createElement("div"); list.className = "chat-list"; list.id = "chatList";
      state.messages.forEach(m => list.appendChild(msgEl(m)));
      body.appendChild(list);
      const input = document.createElement("div"); input.className = "chat-input";
      input.innerHTML = `
        <input id="chatInput" placeholder="Send a message to everyone" maxlength="500" />
        <button id="chatSend"><i class="fas fa-paper-plane"></i></button>`;
      body.appendChild(input);
      const send = () => {
        const v = $("chatInput").value.trim();
        if (!v) return;
        const m = { from: state.myName, fromId: state.myId, text: v, ts: Date.now(), self: true };
        pushMsg(m);
        broadcast({ type: "chat", text: v });
        $("chatInput").value = "";
      };
      $("chatSend").addEventListener("click", send);
      $("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
      setTimeout(() => { const l = $("chatList"); if (l) l.scrollTop = l.scrollHeight; }, 0);
    }
  }
  function personEl(id, name, micOn, camOn, hand, isMe) {
    const d = document.createElement("div"); d.className = "person";
    const av = document.createElement("div"); av.className = "av"; av.style.background = colorFor(name); av.textContent = initials(name);
    const info = document.createElement("div"); info.className = "info";
    info.innerHTML = `<div class="nm">${escapeHtml(name)}</div><div class="role">${isMe && state.isHost ? "Host" : (isMe ? "You" : "Participant")}</div>`;
    const ic = document.createElement("div"); ic.className = "ic";
    ic.innerHTML = `
      ${hand ? '<i class="fas fa-hand-paper" style="color:var(--warning)"></i>' : ""}
      <i class="fas ${micOn ? "fa-microphone" : "fa-microphone-slash off"}"></i>
      <i class="fas ${camOn ? "fa-video" : "fa-video-slash off"}"></i>`;
    d.append(av, info, ic);
    return d;
  }
  function msgEl(m) {
    const d = document.createElement("div");
    d.className = "msg" + (m.system ? " sys" : (m.self ? " me" : ""));
    if (m.system) {
      d.innerHTML = `<div class="bubble">${escapeHtml(m.text)}</div>`;
    } else {
      const time = new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      d.innerHTML = `<div class="meta"><strong>${escapeHtml(m.from)}</strong> · ${time}</div><div class="bubble">${escapeHtml(m.text)}</div>`;
    }
    return d;
  }

  function pushMsg(m) {
    state.messages.push(m);
    if (state.currentTab === "chat" && state.chatOpen) {
      const list = $("chatList");
      if (list) { list.appendChild(msgEl(m)); list.scrollTop = list.scrollHeight; }
    }
  }
  function addSystemMsg(text) { pushMsg({ system: true, text, ts: Date.now() }); }
  function updateChatBadge() {
    const b = $("chatBadge");
    if (state.unreadChat > 0) { b.textContent = state.unreadChat > 9 ? "9+" : state.unreadChat; b.style.display = "flex"; }
    else b.style.display = "none";
  }

  // ---------- Controls ----------
  $("micBtn").addEventListener("click", toggleMic);
  $("camBtn").addEventListener("click", toggleCam);
  $("screenBtn").addEventListener("click", toggleScreen);
  $("handBtn").addEventListener("click", toggleHand);
  $("leaveBtn").addEventListener("click", () => leaveMeeting(true));
  $("settingsBtn").addEventListener("click", () => $("settingsModal").classList.add("open"));
  $("closeSettings").addEventListener("click", () => $("settingsModal").classList.remove("open"));
  $("applySettings").addEventListener("click", applyDevices);
  $("copyIdBtn").addEventListener("click", () => copyText(state.meetingId, "Meeting code copied"));

  // Reactions
  $("reactBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    $("reactionsPop").classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#reactionsPop") && e.target.id !== "reactBtn") {
      $("reactionsPop").classList.remove("open");
    }
  });
  document.querySelectorAll("#reactionsPop button").forEach(b => {
    b.addEventListener("click", () => {
      const em = b.dataset.emoji;
      spawnReaction(em);
      broadcast({ type: "reaction", emoji: em });
      $("reactionsPop").classList.remove("open");
    });
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", (e) => {
    if (!$("meeting").classList.contains("active")) return;
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "m") toggleMic();
    else if (e.key === "c") toggleCam();
    else if (e.key === "s") toggleScreen();
    else if (e.key === "h") toggleHand();
  });

  function updateMediaButtons() {
    $("micBtn").classList.toggle("on", state.micOn);
    $("micBtn").classList.toggle("off", !state.micOn);
    $("micBtn").innerHTML = `<i class="fas fa-microphone${state.micOn ? "" : "-slash"}"></i>`;
    $("camBtn").classList.toggle("on", state.camOn);
    $("camBtn").classList.toggle("off", !state.camOn);
    $("camBtn").innerHTML = `<i class="fas fa-video${state.camOn ? "" : "-slash"}"></i>`;
    $("screenBtn").classList.toggle("on", state.screenSharing);
    $("handBtn").classList.toggle("on", state.handRaised);
  }

  function toggleMic() {
    state.micOn = !state.micOn;
    state.localStream?.getAudioTracks().forEach(t => t.enabled = state.micOn);
    updateMediaButtons(); broadcastState(); renderStage(); renderPanel();
  }
  function toggleCam() {
    state.camOn = !state.camOn;
    state.localStream?.getVideoTracks().forEach(t => t.enabled = state.camOn);
    updateMediaButtons(); broadcastState(); renderStage(); renderPanel();
  }
  function toggleHand() {
    state.handRaised = !state.handRaised;
    updateMediaButtons(); broadcastState(state.handRaised); renderStage(); renderPanel();
    toast(state.handRaised ? "You raised your hand ✋" : "You lowered your hand");
  }

  async function toggleScreen() {
    if (state.screenSharing) {
      stopScreen();
      return;
    }
    try {
      const s = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
      state.screenStream = s;
      state.screenSharing = true;
      // Replace outgoing video track for each call with screen
      const screenTrack = s.getVideoTracks()[0];
      state.connections.forEach(e => {
        const sender = e.call?.peerConnection?.getSenders().find(s => s.track?.kind === "video");
        if (sender) sender.replaceTrack(screenTrack);
      });
      screenTrack.onended = stopScreen;
      updateMediaButtons();
      broadcastState();
      renderStage();
      toast("You are presenting");
    } catch (e) {
      toast("Screen share canceled");
    }
  }
  function stopScreen() {
    state.screenStream?.getTracks().forEach(t => t.stop());
    state.screenStream = null; state.screenSharing = false;
    const camTrack = state.localStream?.getVideoTracks()[0];
    if (camTrack) {
      camTrack.enabled = state.camOn;
      state.connections.forEach(e => {
        const sender = e.call?.peerConnection?.getSenders().find(s => s.track?.kind === "video");
        if (sender) sender.replaceTrack(camTrack);
      });
    }
    updateMediaButtons();
    broadcastState();
    renderStage();
  }

  function spawnReaction(emoji) {
    const em = document.createElement("div");
    em.className = "em"; em.textContent = emoji;
    em.style.left = (10 + Math.random() * 80) + "%";
    $("floatingReactions").appendChild(em);
    setTimeout(()=>em.remove(), 3000);
  }

  function copyText(text, msg) {
    navigator.clipboard?.writeText(text).then(() => toast(msg || "Copied"));
  }

  function leaveMeeting(confirmFirst) {
    if (confirmFirst && !confirm("Leave this meeting?")) return;
    try { state.connections.forEach(e => { try { e.conn?.close(); } catch {} try { e.call?.close(); } catch {} }); } catch {}
    state.connections.clear();
    try { state.localStream?.getTracks().forEach(t => t.stop()); } catch {}
    try { state.screenStream?.getTracks().forEach(t => t.stop()); } catch {}
    try { state.videoEls.forEach(v => { try { v.srcObject = null; } catch {} }); state.videoEls.clear(); } catch {}
    try { state.peer?.destroy(); } catch {}
    state.peer = null; state.localStream = null; state.screenStream = null; state.screenSharing = false;
    if (confirmFirst) {
      // Return to the home/lobby screen reliably.
      const home = location.pathname + location.search;
      try { history.replaceState(null, "", home); } catch {}
      location.replace(home);
    }
  }

  // ---------- Devices ----------
  async function loadDevices() {
    try {
      const list = await navigator.mediaDevices.enumerateDevices();
      const fill = (sel, kind) => {
        sel.innerHTML = "";
        list.filter(d => d.kind === kind).forEach(d => {
          const o = document.createElement("option");
          o.value = d.deviceId; o.textContent = d.label || `${kind} (${d.deviceId.slice(0,6)})`;
          sel.appendChild(o);
        });
      };
      fill($("micSelect"), "audioinput");
      fill($("camSelect"), "videoinput");
      fill($("spkSelect"), "audiooutput");
    } catch {}
  }
  async function applyDevices() {
    const micId = $("micSelect").value, camId = $("camSelect").value;
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        audio: micId ? { deviceId: { exact: micId } } : true,
        video: camId ? { deviceId: { exact: camId } } : true
      });
      // Replace tracks
      const aOld = state.localStream?.getAudioTracks()[0];
      const vOld = state.localStream?.getVideoTracks()[0];
      const aNew = s.getAudioTracks()[0];
      const vNew = s.getVideoTracks()[0];
      aOld && aOld.stop(); vOld && vOld.stop();
      state.localStream = s;
      state.localStream.getAudioTracks().forEach(t => t.enabled = state.micOn);
      state.localStream.getVideoTracks().forEach(t => t.enabled = state.camOn);
      state.connections.forEach(e => {
        const pc = e.call?.peerConnection;
        if (!pc) return;
        pc.getSenders().forEach(snd => {
          if (snd.track?.kind === "audio" && aNew) snd.replaceTrack(aNew);
          if (snd.track?.kind === "video" && vNew && !state.screenSharing) snd.replaceTrack(vNew);
        });
      });
      renderStage();
      toast("Settings applied");
    } catch (e) { toast("Could not switch device"); }
    $("settingsModal").classList.remove("open");
  }

  navigator.mediaDevices?.addEventListener?.("devicechange", loadDevices);
})();
</script>
</body>
</html>
